<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>愛我家鄉-社區營造大作戰</title>
  <style>
    :root {
      --ink: #10233a;
      --cream: #fff7dc;
      --paper: rgba(255, 250, 230, 0.88);
      --blue: #1679c5;
      --green: #2f8f5b;
      --gold: #f2bf4a;
      --shadow: rgba(17, 44, 73, 0.28);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(5, 25, 52, 0.18), rgba(5, 25, 52, 0.02) 36%, rgba(5, 25, 52, 0.22)),
        url("assets/taiwan-community-table-map.png") center / cover fixed no-repeat;
      overflow-x: hidden;
    }

    .entry {
      min-height: 100vh;
      display: grid;
      align-items: center;
      padding: clamp(22px, 4vw, 54px);
      position: relative;
    }

    .entry::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 74% 18%, rgba(255, 246, 170, 0.32), transparent 20%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(0, 61, 104, 0.12));
      pointer-events: none;
    }

    .hero {
      position: relative;
      width: min(760px, 100%);
      padding: clamp(22px, 4vw, 42px);
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255, 252, 237, 0.94), rgba(255, 245, 213, 0.86));
      border: 3px solid rgba(255, 255, 255, 0.86);
      box-shadow: 0 26px 70px var(--shadow), inset 0 0 0 1px rgba(16, 35, 58, 0.08);
      backdrop-filter: blur(9px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 13px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #1b8ccc, #2f8f5b);
      font-weight: 900;
      letter-spacing: 0.06em;
      box-shadow: 0 10px 24px rgba(22, 121, 197, 0.26);
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 78px);
      line-height: 1.03;
      letter-spacing: 0.03em;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.68);
    }

    .subtitle {
      margin: 16px 0 0;
      font-size: clamp(18px, 2.4vw, 28px);
      line-height: 1.45;
      font-weight: 800;
      color: #225b4a;
    }

    .description {
      margin: 18px 0 0;
      max-width: 640px;
      font-size: 16px;
      line-height: 1.85;
      color: #38516c;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 13px 20px;
      border-radius: 18px;
      color: #fff;
      text-decoration: none;
      font-weight: 900;
      letter-spacing: 0.04em;
      border: 0;
      box-shadow: 0 16px 32px rgba(16, 35, 58, 0.22);
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .button.primary {
      min-width: 190px;
      background: linear-gradient(180deg, #ff9f2d, #d96b13);
    }

    .button.secondary {
      background: linear-gradient(180deg, #2188c7, #12649d);
    }

    .button.ghost {
      color: #1a4b66;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(30, 88, 122, 0.18);
    }

    .teacher-note {
      display: grid;
      gap: 8px;
      margin-top: 26px;
      padding: 15px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(30, 88, 122, 0.14);
      color: #38516c;
      line-height: 1.55;
    }

    .teacher-note strong {
      color: #225b4a;
    }

    .footer {
      position: fixed;
      right: 18px;
      bottom: 14px;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: #24455f;
      font-size: 13px;
      font-weight: 800;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 720px) {
      body {
        background-attachment: scroll;
      }

      .entry {
        align-items: end;
        padding: 18px;
      }

      .hero {
        border-radius: 26px;
      }

      .button {
        width: 100%;
      }

      .footer {
        position: static;
        margin: 14px 18px 18px;
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="entry">
    <section class="hero" aria-label="遊戲入口">
      <div class="badge">老師入口｜康軒小四社會</div>
      <h1>愛我家鄉<br>社區營造大作戰</h1>
      <p class="subtitle">讓家鄉被看見，也讓家鄉住得下去。</p>
      <p class="description">
        這是一款社區營造放置型攻防卡牌遊戲。玩家透過主線卡、加成卡、防禦卡與攻擊卡，
        在觀光、收入、文化、生態、民心與效率之間做取捨，理解地方發展不是單純變熱鬧，
        而是要讓社區能長久生活。
      </p>

      <div class="actions">
        <a class="button primary" href="player_window/player-window.html">開始遊戲</a>
        <a class="button secondary" href="demo.html">主控戰情室</a>
        <a class="button ghost" href="design_overview.md">設計說明</a>
      </div>

      <div class="teacher-note">
        <strong>老師使用方式</strong>
        <span>投影本頁作為遊戲入口，學生進入玩家視窗後即可開始四人座位制卡牌對戰。</span>
      </div>
    </section>
  </main>

  <div class="footer">D:\Codex\home_community_battle</div>
</body>
</html>
