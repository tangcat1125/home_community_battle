<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Window</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(9, 15, 34, 0.84);
      --panel-strong: rgba(16, 24, 48, 0.94);
      --line: rgba(120, 160, 255, 0.18);
      --text: #ecf3ff;
      --muted: #8ea0c8;
      --accent: #4fd1ff;
      --accent-2: #7c5cff;
      --danger: #ff6b8a;
      --good: #67e8a5;
      --card: rgba(20, 30, 56, 0.92);
      --card-edge: rgba(118, 166, 255, 0.24);
      --reel-rotation: 0deg;
      --reel-user-rotation: 0deg;
      --reel-scale: 1;
      --seat-bottom: 22px;
      --seat-side: 20px;
      --radius: 22px;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(79, 209, 255, 0.14), transparent 26%),
        radial-gradient(circle at 80% 10%, rgba(124, 92, 255, 0.16), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(103, 232, 165, 0.08), transparent 24%),
        linear-gradient(145deg, #02040a 0%, #091225 42%, #040912 100%);
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr;
    }

    .topbar {
      display: none;
    }

    .left-toolbox {
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 80;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(7, 12, 24, 0.88);
      border: 1px solid rgba(120, 160, 255, 0.18);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .tool-row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
    }

    .tool-row .mini-btn {
      font-size: 12px;
      padding: 8px 10px;
      width: 100%;
    }

    .sound-toggle {
      font-size: 18px;
      line-height: 1;
      min-width: 42px;
      min-height: 40px;
    }

    .sound-toggle.playing {
      background: linear-gradient(180deg, #30b6ff, #197ed9);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.18),
        0 0 18px rgba(79, 209, 255, 0.28);
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: 0.02em;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      gap: 10px;
      justify-items: end;
      min-width: 360px;
    }

    .button-row, .focus-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    button, .chip {
      border: 0;
      border-radius: 14px;
      padding: 10px 14px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(56, 76, 116, 0.96), rgba(33, 44, 72, 0.96));
      box-shadow: inset 0 0 0 1px rgba(159, 191, 255, 0.12);
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease, background 0.15s ease;
      font-weight: 700;
    }

    button:hover, .chip:hover { transform: translateY(-1px); filter: brightness(1.08); }
    button.primary { background: linear-gradient(180deg, #30b6ff, #197ed9); }
    button.danger { background: linear-gradient(180deg, #5e6a88, #34405c); }
    button.ghost { background: linear-gradient(180deg, rgba(71, 84, 112, 0.9), rgba(44, 54, 76, 0.92)); }
    button.active, .chip.active {
      box-shadow: inset 0 0 0 1px rgba(79, 209, 255, 0.55), 0 0 0 1px rgba(79, 209, 255, 0.2);
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="range"] {
      width: 180px;
      accent-color: var(--accent);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      padding: 16px 18px 18px;
      min-height: 0;
    }

    .layout.sidebar-hidden {
      grid-template-columns: minmax(0, 1fr);
    }

    .layout.hud-hidden .theme-slots,
    .layout.hud-hidden .player-hud,
    .layout.hud-hidden .shop-panel,
    .layout.hud-hidden .sidebar {
      display: none;
    }

    .table-shell {
      position: relative;
      border-radius: 26px;
      border: 1px solid rgba(140, 175, 255, 0.16);
      background:
        radial-gradient(circle at center, rgba(79, 209, 255, 0.14), transparent 34%),
        radial-gradient(circle at center, rgba(124, 92, 255, 0.10), transparent 52%),
        rgba(3, 8, 22, 0.92);
      overflow: hidden;
      min-height: 0;
      touch-action: none;
      cursor: grab;
    }

    .table-shell.dragging { cursor: grabbing; }

    .table-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 27%, rgba(79, 209, 255, 0.06) 28%, transparent 29%),
        radial-gradient(circle at center, transparent 41%, rgba(124, 92, 255, 0.05) 42%, transparent 43%);
      pointer-events: none;
    }

    .reel-stage {
      position: absolute;
      inset: 22px 18px 18px;
      display: grid;
      place-items: center;
    }

    .theme-slots {
      position: absolute;
      left: min(880px, calc(100% - 720px));
      bottom: 34px;
      z-index: 48;
      display: grid;
      grid-template-columns: repeat(2, 66px);
      grid-template-rows: auto repeat(2, 74px) auto;
      gap: 7px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(5, 10, 22, 0.5);
      border: 1px solid rgba(140, 175, 255, 0.16);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    .theme-panel-title,
    .theme-panel-footer {
      grid-column: 1 / -1;
      text-align: center;
      font-weight: 900;
      color: #f2f7ff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
    }

    .theme-panel-title {
      font-size: 14px;
      letter-spacing: 0.06em;
    }

    .theme-panel-footer {
      font-size: 13px;
      color: #d6e8ff;
    }

    .theme-slot {
      min-height: 74px;
      border-radius: 12px;
      padding: 7px;
      background: linear-gradient(180deg, rgba(18, 30, 58, 0.92), rgba(7, 12, 28, 0.9));
      border: 1px solid rgba(169, 207, 255, 0.2);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22), inset 0 0 0 1px rgba(79, 209, 255, 0.04);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, filter 0.16s ease;
    }

    .theme-slot:hover {
      transform: translateY(-3px);
      filter: brightness(1.06);
      border-color: rgba(79, 209, 255, 0.42);
    }

    .theme-slot.empty {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 4px;
      color: var(--muted);
      border-style: dashed;
    }

    .theme-slot.ready {
      border-color: rgba(103, 232, 165, 0.5);
      box-shadow: 0 0 0 1px rgba(103, 232, 165, 0.12), 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .theme-code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      font-weight: 900;
      letter-spacing: 0.03em;
      background: rgba(79, 209, 255, 0.15);
      border: 1px solid rgba(129, 171, 255, 0.22);
      color: #dcf5ff;
    }

    .theme-card {
      display: grid;
      gap: 4px;
    }

    .theme-card img,
    .hand-card-art,
    .shop-card img {
      width: 100%;
      object-fit: cover;
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(4, 8, 18, 0.6);
    }

    .theme-card img {
      height: 34px;
      border-radius: 8px;
    }

    .theme-name {
      font-size: 10px;
      line-height: 1.25;
      font-weight: 900;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .theme-meta {
      font-size: 9px;
      color: var(--muted);
      line-height: 1.25;
    }

    .player-hud {
      position: absolute;
      left: min(1040px, calc(100% - 470px));
      bottom: 64px;
      z-index: 49;
      width: 290px;
      padding: 14px 16px;
      border-radius: 0;
      background: linear-gradient(180deg, rgba(18, 29, 55, 0.88), rgba(9, 15, 30, 0.88));
      border-left: 1px solid rgba(140, 175, 255, 0.18);
      box-shadow: inset 0 -1px 0 rgba(140, 175, 255, 0.13);
      pointer-events: auto;
    }

    .player-hud-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 10px;
    }

    .player-hud-name {
      font-size: 18px;
      font-weight: 900;
    }

    .player-hud-sub,
    .player-hud-hp {
      color: var(--muted);
      font-size: 12px;
    }

    .player-hud-lines {
      display: grid;
      gap: 6px;
      color: #d8e6ff;
      font-size: 13px;
      line-height: 1.25;
    }

    .shop-panel {
      position: absolute;
      right: 26px;
      bottom: 18px;
      z-index: 47;
      width: 420px;
      max-width: calc(100% - 920px);
      min-width: 340px;
      max-height: 258px;
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 20px;
      background: rgba(9, 15, 32, 0.9);
      border: 1px solid rgba(140, 175, 255, 0.18);
      backdrop-filter: blur(12px);
      box-shadow: 0 22px 52px rgba(0, 0, 0, 0.3);
      pointer-events: auto;
      overflow: hidden;
    }

    .shop-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .shop-title {
      display: grid;
      gap: 2px;
    }

    .shop-title strong {
      font-size: 15px;
    }

    .shop-title span {
      color: var(--muted);
      font-size: 11px;
    }

    .shop-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .shop-market {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      min-height: 0;
    }

    .shop-card {
      display: grid;
      gap: 5px;
      min-height: 148px;
      padding: 7px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(25, 39, 69, 0.95), rgba(12, 20, 39, 0.95));
      border: 1px solid rgba(140, 175, 255, 0.15);
    }

    .shop-card img {
      height: 52px;
      border-radius: 10px;
    }

    .shop-card .name {
      font-size: 11px;
      line-height: 1.2;
      font-weight: 900;
    }

    .shop-card .meta {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
    }

    .reel-board {
      position: relative;
      width: min(92vmin, 900px);
      height: min(92vmin, 900px);
      border-radius: 34px;
      transform: translateZ(0) scale(var(--reel-scale)) rotate(calc(var(--reel-rotation) + var(--reel-user-rotation)));
      transition: transform 0.38s ease;
      filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.3));
      overflow: hidden;
    }

    .reel-map {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(4, 10, 23, 0.1), rgba(4, 10, 23, 0.26)),
        url("../assets/taiwan-community-table-map.png") center / cover no-repeat;
      border-radius: inherit;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.14), inset 0 -90px 130px rgba(3, 7, 18, 0.28);
    }

    .reel-map::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 34%, rgba(4, 8, 18, 0.10) 58%, rgba(4, 8, 18, 0.24) 100%),
        linear-gradient(90deg, rgba(3, 8, 18, 0.1), transparent 18%, transparent 82%, rgba(3, 8, 18, 0.1));
      pointer-events: none;
    }

    .reel-hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      transform: none;
      transition: transform 0.38s ease;
    }

    .seat-board {
      position: absolute;
      width: 348px;
      height: 222px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: 26px 86px 86px;
      gap: 5px;
      padding: 9px;
      border-radius: 18px;
      background: rgba(4, 10, 22, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(2px);
      pointer-events: auto;
    }

    .seat-board.self { left: 50%; bottom: 7%; transform: translateX(-50%); }
    .seat-board.top { left: 50%; top: 7%; transform: translateX(-50%) rotate(180deg); }
    .seat-board.right { right: 5%; top: 50%; transform: translateY(-50%) rotate(90deg); }
    .seat-board.left { left: 5%; top: 50%; transform: translateY(-50%) rotate(-90deg); }

    .seat-board-title {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5px;
      color: #f7fbff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.58);
    }

    .slot {
      position: relative;
      display: grid;
      gap: 4px;
      width: auto;
      min-height: 0;
      padding: 6px;
      border-radius: 10px;
      background: rgba(6, 12, 24, 0.48);
      border: 2px solid rgba(8, 12, 18, 0.88);
      backdrop-filter: blur(4px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      pointer-events: auto;
      overflow: hidden;
    }

    .slot.kind-attack { border-color: rgba(17, 24, 39, 0.98); }
    .slot.kind-defense { border-color: rgba(12, 20, 34, 0.98); }
    .slot.kind-boost { border-color: rgba(220, 38, 38, 0.92); }

    .slot .slot-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      color: #dcecff;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .slot .slot-body {
      display: grid;
      gap: 8px;
    }

    .slot.slot-attack-1 { grid-column: 1 / 3; grid-row: 2; }
    .slot.slot-attack-2 { grid-column: 3 / 5; grid-row: 2; }
    .slot.slot-attack-3 { grid-column: 5 / 7; grid-row: 2; }
    .slot.slot-defense-1 { grid-column: 1 / 3; grid-row: 3; }
    .slot.slot-defense-2 { grid-column: 3 / 5; grid-row: 3; }
    .slot.slot-boost-1 { grid-column: 5 / 7; grid-row: 3; }
    .slot.slot-boost-2 { grid-column: 7 / 8; grid-row: 2 / 4; }

    .card {
      border-radius: 14px;
      padding: 7px 8px;
      background: linear-gradient(180deg, rgba(30, 44, 77, 0.98), rgba(17, 27, 49, 0.98));
      border: 1px solid rgba(139, 177, 255, 0.15);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      min-height: 100%;
    }

    .card.face-down {
      background:
        radial-gradient(circle at 50% 36%, rgba(79, 209, 255, 0.18), transparent 32%),
        linear-gradient(135deg, rgba(18, 31, 58, 0.98), rgba(10, 16, 32, 0.98)),
        repeating-linear-gradient(45deg, rgba(79, 209, 255, 0.16) 0 8px, rgba(124, 92, 255, 0.16) 8px 16px);
      border-color: rgba(79, 209, 255, 0.36);
    }

    .card .name {
      font-weight: 800;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .card .meta {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: #dbe8ff;
      font-size: 11px;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(78, 110, 168, 0.26);
      border: 1px solid rgba(129, 171, 255, 0.16);
    }

    .sidebar {
      display: grid;
      gap: 14px;
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .sidebar.hidden {
      display: none;
    }

    .panel {
      border-radius: var(--radius);
      padding: 16px;
      background: var(--panel);
      border: 1px solid rgba(138, 171, 255, 0.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .status-grid {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .status-grid strong { color: var(--text); }

    .seat-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .seat {
      position: absolute;
      width: 238px;
      border-radius: 20px;
      background: rgba(11, 16, 30, 0.72);
      border: 1px solid rgba(140, 175, 255, 0.18);
      padding: 12px;
      backdrop-filter: blur(8px);
      pointer-events: auto;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .seat:hover { transform: translateY(-2px); }
    .seat.active {
      border-color: rgba(79, 209, 255, 0.62);
      box-shadow: 0 0 0 1px rgba(79, 209, 255, 0.2), 0 18px 42px rgba(0, 0, 0, 0.18);
    }

    .seat .seat-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .seat .seat-name { font-size: 17px; font-weight: 800; }
    .seat .seat-meta { color: var(--muted); font-size: 12px; }
    .seat .seat-lines { display: grid; gap: 4px; color: #c6d7fb; font-size: 13px; }

    .seat.bottom {
      left: 94px;
      bottom: 18px;
      transform: none;
      width: min(860px, calc(100% - 760px));
      min-width: 720px;
      max-height: none;
      overflow: visible;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(180deg, rgba(17, 26, 49, 0.9), rgba(11, 18, 34, 0.9));
      padding: 12px 14px;
      z-index: 50;
    }

    .self-summary {
      display: grid;
      gap: 4px;
      padding-bottom: 2px;
      border-bottom: 1px solid rgba(140, 175, 255, 0.12);
    }

    .self-cards {
      display: grid;
      gap: 6px;
      min-height: 0;
    }

    .seat.bottom .board-wrap {
      display: none;
    }

    .seat.right {
      right: var(--seat-side);
      top: 50%;
      transform: translateY(-50%);
    }

    .seat.left {
      left: var(--seat-side);
      top: 50%;
      transform: translateY(-50%);
    }

    .seat.top {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
    }

    .hand-wrap {
      display: grid;
      gap: 8px;
    }

    .hand-wrap.collapsed {
      gap: 4px;
    }

    .hand-wrap.collapsed .board-wrap {
      display: none;
    }

    .hand-wrap.collapsed .hand-folder {
      padding: 4px 6px;
      min-height: 28px;
    }

    .hand-wrap.collapsed .folder-icon {
      width: 22px;
      height: 22px;
      font-size: 11px;
    }

    .hand-wrap.collapsed .folder-title {
      font-size: 11px;
    }

    .hand-wrap.collapsed .folder-meta,
    .hand-wrap.collapsed .folder-preview {
      font-size: 9px;
    }

    .hand-wrap.collapsed .folder-preview {
      display: none;
    }

    .hand-wrap.collapsed {
      width: fit-content;
      align-self: flex-start;
    }

    .hand-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .hand-folder {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(12, 19, 36, 0.92);
      border: 1px solid rgba(140, 175, 255, 0.16);
      min-height: 52px;
    }

    .folder-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(48, 182, 255, 0.18), rgba(25, 39, 69, 0.96));
      border: 1px solid rgba(129, 171, 255, 0.18);
      font-size: 17px;
    }

    .folder-copy {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .folder-title {
      font-size: 13px;
      font-weight: 800;
    }

    .folder-meta, .folder-preview {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .hand-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .hand-grid {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 145px;
      gap: 10px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 2px 8px;
      overscroll-behavior-x: contain;
      scrollbar-width: thin;
    }

    .hand-card {
      min-height: 268px;
      border-radius: 14px;
      padding: 9px;
      background: linear-gradient(180deg, rgba(25, 39, 69, 0.98), rgba(15, 24, 42, 0.98));
      border: 1px solid rgba(140, 175, 255, 0.16);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform 0.16s ease, border-color 0.16s ease, filter 0.16s ease;
    }

    .hand-card:hover { transform: translateY(-2px); filter: brightness(1.04); }
    .hand-card.selected {
      border-color: rgba(79, 209, 255, 0.58);
      box-shadow: 0 0 0 1px rgba(79, 209, 255, 0.14);
    }
    .hand-card-art {
      height: 118px;
      border-radius: 10px;
      margin-bottom: 6px;
      object-fit: contain;
      background: rgba(5, 10, 22, 0.72);
    }
    .hand-card .name { font-size: 13px; line-height: 1.2; }
    .hand-card .meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      margin-top: 4px;
    }
    .hand-card .meta.desc {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      pointer-events: auto;
      margin-top: auto;
    }

    .mini-btn {
      border: 1px solid rgba(129, 171, 255, 0.18);
      background: rgba(26, 39, 68, 0.96);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      pointer-events: auto;
    }

    .mini-btn:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .mini-btn.danger {
      background: rgba(88, 45, 63, 0.96);
      border-color: rgba(255, 130, 160, 0.22);
    }

    .stack-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .mini {
      width: 100%;
      padding: 10px;
      border-radius: 14px;
      background: rgba(12, 19, 36, 0.78);
      border: 1px solid rgba(141, 177, 255, 0.12);
      color: #dbe8ff;
      font-size: 12px;
      line-height: 1.4;
      min-height: 60px;
    }

    .board-stack {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .board-item {
      border-radius: 14px;
      padding: 8px 9px;
      background: rgba(12, 19, 36, 0.82);
      border: 1px solid rgba(141, 177, 255, 0.12);
      display: grid;
      gap: 6px;
      min-height: 72px;
    }

    .board-item .title {
      font-size: 12px;
      font-weight: 800;
    }

    .board-item .meta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.25;
    }

    .mini.hidden { opacity: 0.78; }
    .mini strong { display: block; margin-bottom: 4px; }

    .log {
      display: grid;
      gap: 8px;
      max-height: 280px;
      overflow: auto;
    }

    .log-entry {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(140, 175, 255, 0.12);
      background: rgba(5, 10, 22, 0.72);
      color: #d8e5ff;
      font-size: 13px;
      line-height: 1.45;
    }

    .zoom-note {
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    @media (min-width: 1101px) and (max-width: 1500px) {
      .seat.bottom {
        left: 92px;
        width: 620px;
        min-width: 620px;
      }

      .theme-slots {
        left: 735px;
      }

      .player-hud {
        left: 905px;
        width: 280px;
      }

      .shop-panel {
        top: 24px;
        right: 20px;
        bottom: auto;
        width: 330px;
        min-width: 330px;
        max-width: 330px;
      }

      .shop-market {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 1100px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100%; }
      .layout {
        grid-template-columns: 1fr;
      }
      .toolbar {
        min-width: 0;
        justify-items: start;
      }
      .seat.bottom { left: 20px; bottom: 24px; width: calc(100% - 40px); max-height: none; }
      .player-hud, .theme-slots, .shop-panel { position: relative; inset: auto; width: auto; max-width: none; min-width: 0; margin: 10px; }
      .theme-slots { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .seat.left, .seat.right, .seat.top { position: relative; inset: auto; transform: none; width: auto; margin: 10px; }
      .seat-grid { position: static; display: grid; grid-template-columns: 1fr; gap: 12px; padding: 12px; }
      .reel-board { width: min(100%, 680px); height: min(92vw, 680px); }
      .seat-board {
        width: 280px;
        height: 184px;
        grid-template-rows: 24px 70px 70px;
        gap: 4px;
        padding: 7px;
      }
      .slot { width: auto; padding: 5px; }
      .card .meta, .tag-row { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="left-toolbox">
      <div class="tool-row">
        <button class="primary" id="btnZoomIn" aria-label="放大">+</button>
        <button class="ghost" id="btnZoomOut" aria-label="縮小">-</button>
        <button class="ghost" id="btnResetView" aria-label="回到玩家視角">r</button>
      </div>
      <div class="tool-row">
        <button class="ghost" id="btnToggleHud">HUD</button>
        <button class="primary" id="btnEndTurn">結束回合</button>
        <button class="danger" id="btnAutoAI">AI</button>
        <button class="ghost sound-toggle" id="btnSoundToggle" aria-label="播放背景音樂" title="播放背景音樂">🔇</button>
      </div>
    </div>

    <audio id="bgmAudio" src="../assets/audio/bamboo-market-quest.mp3" loop preload="auto"></audio>

    <main class="layout sidebar-hidden">
      <section class="table-shell">
        <div class="reel-stage">
          <div class="reel-board" id="reelBoard">
            <div class="reel-map" aria-hidden="true"></div>
            <div class="reel-hud" id="reelHud"></div>
          </div>
        </div>
        <div class="seat-grid" id="seatGrid"></div>
        <div class="theme-slots" id="themeSlots" aria-label="地方主題放置區"></div>
        <div class="player-hud" id="playerHud" aria-label="玩家資訊"></div>
        <div class="shop-panel" id="shopPanel" aria-label="卡牌商店"></div>
      </section>

      <aside class="sidebar hidden">
        <section class="panel">
          <h2>玩家概況</h2>
          <div class="status-grid" id="playerStatus"></div>
        </section>

        <section class="panel">
          <h2>對局資訊</h2>
          <div class="status-grid" id="matchStatus"></div>
        </section>

        <section class="panel">
          <h2>事件紀錄</h2>
          <div class="log" id="log"></div>
        </section>
      </aside>
    </main>
  </div>

  <script src="../sample-cards.js?v=20260615_complete_cards"></script>
  <script src="reel.js"></script>
  <script>
    const reel = new TableReelSystem();
    const seatOrder = ["self", "right", "left", "top"];
    const tableShell = document.querySelector(".table-shell");
    const reelHud = document.getElementById("reelHud");
    const seatGrid = document.getElementById("seatGrid");
    const themeSlots = document.getElementById("themeSlots");
    const playerHud = document.getElementById("playerHud");
    const shopPanel = document.getElementById("shopPanel");
    const playerStatus = document.getElementById("playerStatus");
    const matchStatus = document.getElementById("matchStatus");
    const logEl = document.getElementById("log");
    const layout = document.querySelector(".layout");
    const sidebar = document.querySelector(".sidebar");
    const bgmAudio = document.getElementById("bgmAudio");
    const soundToggle = document.getElementById("btnSoundToggle");

    const extendedCards = [...(window.sampleCards || [])];
    const scoreLabels = {
      income: "收入",
      tourism: "觀光",
      culture: "文化",
      ecology: "生態",
      publicSupport: "民心",
    };
    const resourceLabels = {
      money: "錢",
      luck: "幸運",
      population: "人口",
      manpower: "人力",
      time: "時間",
      tech: "技術",
    };

    let focusSeatIndex = 0;
    let round = 1;
    let turnSeatIndex = 0;
    let selectedCardIndex = null;
    let handCollapsed = false;
    let hudCollapsed = false;
    let aiTurnRunning = false;
    let turnCounter = 1;
    let userRotation = 0;
    let zoomScale = 1;
    let bgmEnabled = false;
    let shopMarket = [];
    const activePointers = new Map();
    const dragState = {
      mode: null,
      pointerId: null,
      startX: 0,
      baseRotation: 0,
      baseScale: 1,
      baseDistance: 0,
    };

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    const state = seatOrder.map((seatKey, seatIndex) => createPlayer(seatKey, seatIndex));

    function createDeck() {
      const deck = [];
      extendedCards.forEach((card, idx) => {
        const copyCount = card.type === "MainTheme" ? 1 : card.type === "Attack" ? 3 : card.type === "Defense" ? 3 : 2;
        for (let i = 0; i < copyCount; i += 1) {
          deck.push(cloneCard(card, `${idx}_${i}`));
        }
      });
      return shuffle(deck);
    }

    function createEmptyBoard() {
      return {
        trap: [null],
        boost: [null, null],
        attack: [null, null, null],
        defense: [null, null],
        theme: [null, null, null, null],
      };
    }

    function createPlayer(seatKey, seatIndex) {
      return {
        seatKey,
        seatIndex,
        id: seatKey,
        name: reel.getSeatLabel(seatIndex),
        hp: 100,
        maxHp: 100,
        armor: 0,
        energy: 3,
        maxEnergy: 3,
        points: 5,
        cashflow: 0,
        visitorFlow: 0,
        monthlyVisitors: 120,
        money: 5,
        luck: 0,
        population: 3,
        manpower: 3,
        time: 3,
        tech: 2,
        scores: {
          income: 0,
          tourism: 0,
          culture: 0,
          ecology: 0,
          publicSupport: 0,
        },
        deck: createDeck(),
        hand: [],
        discardPile: [],
        graveyard: [],
        board: createEmptyBoard(),
        history: [],
      };
    }

    function cloneCard(card, suffix = "copy") {
      return {
        ...card,
        effect: card.effect ? { ...card.effect } : undefined,
        scores: card.scores ? { ...card.scores } : undefined,
        instanceId: `${card.id}_${suffix}_${Math.random().toString(36).slice(2, 8)}`,
      };
    }

    function isMainTheme(card) {
      return card?.type === "MainTheme";
    }

    function themePointValue(card) {
      return Object.values(card?.scores || {}).reduce((sum, value) => sum + Number(value || 0), 0);
    }

    function themeCashflowValue(card) {
      const scores = card?.scores || {};
      const income = Number(scores.income || 0);
      const tourism = Number(scores.tourism || 0);
      return Math.max(1, income + Math.floor(tourism / 2));
    }

    function themeVisitorFlowValue(card) {
      const scores = card?.scores || {};
      const tourism = Number(scores.tourism || 0);
      const income = Number(scores.income || 0);
      const culture = Number(scores.culture || 0);
      return Math.max(80, tourism * 180 + income * 70 + culture * 45);
    }

    function currentMonthlyVisitors(player) {
      return Math.max(0, player.monthlyVisitors + player.visitorFlow + player.scores.tourism * 60);
    }

    function applyScores(player, scores = {}, direction = 1) {
      Object.keys(scoreLabels).forEach((key) => {
        player.scores[key] += Number(scores[key] || 0) * direction;
      });
    }

    function applyResourceEffect(player, effect = {}) {
      Object.keys(resourceLabels).forEach((key) => {
        if (effect[key]) {
          player[key] += Number(effect[key]);
        }
      });

      const scoreEffect = {};
      Object.keys(scoreLabels).forEach((key) => {
        if (effect[key]) scoreEffect[key] = effect[key];
      });
      applyScores(player, scoreEffect, 1);

      player.energy = Math.min(player.maxEnergy + 2, player.energy + (effect.energy || 0));
      player.hp = Math.min(player.maxHp, player.hp + (effect.heal || 0));
    }

    function shuffle(items) {
      const array = [...items];
      for (let i = array.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function dealToFive(player) {
      while (player.hand.length < 5 && player.deck.length > 0) {
        player.hand.push(player.deck.pop());
      }
    }

    function ensureOpeningThemeCard(player) {
      if (player.hand.some(isMainTheme)) return;
      const deckIndex = player.deck.findIndex(isMainTheme);
      if (deckIndex < 0) return;
      const [themeCard] = player.deck.splice(deckIndex, 1);
      const replaceIndex = player.hand.findIndex((card) => !isMainTheme(card));
      if (replaceIndex >= 0) {
        player.deck.unshift(player.hand[replaceIndex]);
        player.hand[replaceIndex] = themeCard;
      } else if (player.hand.length < 5) {
        player.hand.push(themeCard);
      }
    }

    function buildShopMarket() {
      const pool = extendedCards.filter((card) => card.type !== "Attack");
      shopMarket = shuffle(pool).slice(0, 4).map((card, index) => cloneCard(card, `shop_${turnCounter}_${index}`));
    }

    function buyShopCard(index) {
      const self = state[0];
      const card = shopMarket[index];
      if (!card) return;

      const cost = card.shopCost || Math.max(2, (card.cost || 0) + 2);
      if (self.points < cost) {
        pushLog(`點數不足，無法購買 ${card.name}。`);
        render();
        return;
      }

      self.points -= cost;
      const bought = cloneCard(card, `bought_${Date.now()}`);
      if (self.hand.length < 5) {
        self.hand.push(bought);
        pushLog(`${self.name} 用 ${cost} 點購買 ${card.name}，加入手牌。`);
      } else {
        self.discardPile.unshift(bought);
        pushLog(`${self.name} 用 ${cost} 點購買 ${card.name}，手牌已滿，先放入棄牌堆。`);
      }
      render();
    }

    function collectCashflow() {
      const self = state[0];
      if (self.cashflow <= 0) {
        pushLog("目前沒有現金流，先把地方主題放進 S1-S3。");
        render();
        return;
      }
      self.points += self.cashflow;
      pushLog(`${self.name} 收取現金流 +${self.cashflow} 點。`);
      render();
    }

    function refreshShopMarket() {
      const self = state[0];
      if (self.points <= 0) {
        pushLog("點數不足，無法刷新商店。");
        render();
        return;
      }
      self.points -= 1;
      buildShopMarket();
      pushLog(`${self.name} 花 1 點刷新卡牌商店。`);
      render();
    }

    function pushGraveyard(player, card, source) {
      if (!card) return;
      player.graveyard.unshift({
        card,
        source,
        round,
        ts: Date.now(),
      });
      if (player.graveyard.length > 20) {
        player.graveyard.length = 20;
      }
    }

    function discardHandCard(player, cardIndex) {
      const turn = currentTurnPlayer();
      if (!turn || turn.id !== player.id) {
        pushLog(`${player.name} cannot discard right now.`);
        return;
      }

      const card = player.hand[cardIndex];
      if (!card) return;

      player.hand.splice(cardIndex, 1);
      player.discardPile.unshift(card);
      if (player.discardPile.length > 20) {
        player.discardPile.length = 20;
      }
      pushGraveyard(player, card, "hand");
      player.history.unshift(`${card.name} discarded from hand`);
      if (player.history.length > 6) player.history.length = 6;

      dealToFive(player);
      ensureOpeningThemeCard(player);
      pushLog(`${player.name} discarded ${card.name} from hand.`);
      render();
    }

    function discardBoardCard(player, lane) {
      const turn = currentTurnPlayer();
      if (!turn || turn.id !== player.id) {
        pushLog(`${player.name} cannot discard board cards right now.`);
        return;
      }

      let slotValue = null;
      let targetList = null;
      let slotIndex = -1;
      let label = lane.label;

      if (lane.slot === "attack") {
        targetList = player.board.attack;
        slotIndex = lane.slotIndex;
        slotValue = targetList[slotIndex];
      } else if (lane.slot === "defense") {
        targetList = player.board.defense;
        slotIndex = lane.slotIndex;
        slotValue = targetList[slotIndex];
      } else if (lane.key === "trap") {
        targetList = player.board.trap;
        slotIndex = 0;
        slotValue = targetList[0];
      } else if (lane.slot === "boost") {
        targetList = player.board.boost;
        slotIndex = lane.slotIndex;
        slotValue = targetList[slotIndex];
      } else if (lane.slot === "theme") {
        targetList = player.board.theme;
        slotIndex = lane.slotIndex;
        slotValue = targetList[slotIndex];
      }

      if (!slotValue) return;

      const card = slotValue.card;
      if (lane.slot === "defense") {
        player.armor = Math.max(0, player.armor - (card.effect?.block || 5));
      } else if (lane.slot === "theme") {
        player.cashflow = Math.max(0, player.cashflow - themeCashflowValue(card));
        player.visitorFlow = Math.max(0, player.visitorFlow - themeVisitorFlowValue(card));
        applyScores(player, card.scores, -1);
      }

      targetList[slotIndex] = null;
      pushGraveyard(player, card, `board:${lane.key}`);
      player.history.unshift(`${card.name} removed from board`);
      if (player.history.length > 6) player.history.length = 6;
      pushLog(`${player.name} removed ${card.name} from ${label}.`);
      render();
    }

    function resetMatch() {
      round = 1;
      turnSeatIndex = 0;
      selectedCardIndex = null;
      handCollapsed = false;
      hudCollapsed = false;
      aiTurnRunning = false;
      focusSeatIndex = 0;
      userRotation = 0;
      zoomScale = 1;

      state.forEach((player, index) => {
        state[index] = createPlayer(player.seatKey, index);
        dealToFive(state[index]);
        ensureOpeningThemeCard(state[index]);
        state[index].history.push("Player state reset.");
      });

      buildShopMarket();
      pushLog("Match started with 4 players.");
      pushLog("Player view reset.");
      render();
    }

    function pushLog(message) {
      const entry = {
        round,
        turnSeatIndex,
        message,
        ts: Date.now(),
      };
      const player = state[turnSeatIndex];
      player.history.unshift(message);
      if (player.history.length > 6) player.history.length = 6;
      if (!window._log) window._log = [];
      window._log.unshift(entry);
      window._log.length = Math.min(window._log.length, 12);
    }

    function currentFocusPlayer() {
      return state[focusSeatIndex];
    }

    function currentTurnPlayer() {
      return state[turnSeatIndex];
    }

    function beginTurn(seatIndex) {
      const player = state[seatIndex];
      turnSeatIndex = seatIndex;
      focusSeatIndex = seatIndex;
      player.energy = player.maxEnergy;
      player.points += player.cashflow;
      player.manpower += player.population > 5 ? 2 : 1;
      player.time += 1;
      player.tech += 1;
      dealToFive(player);
      ensureOpeningThemeCard(player);
      pushLog(`${player.name} 開始回合${player.cashflow ? `，收取現金流 +${player.cashflow}` : ""}。`);
    }

    function nextAliveSeatIndex(fromIndex) {
      for (let step = 1; step <= state.length; step += 1) {
        const index = (fromIndex + step) % state.length;
        if (state[index].hp > 0) return index;
      }
      return fromIndex;
    }

    function chooseAiCardIndex(player) {
      const themeIndex = player.hand.findIndex((card) => isMainTheme(card) && player.board.theme.some((slot) => !slot));
      if (themeIndex >= 0) return themeIndex;

      const defenseIndex = player.hand.findIndex((card) => reel.getCardLane(card.type) === "defense" && player.board.defense.some((slot) => !slot));
      if (defenseIndex >= 0 && player.hp < player.maxHp * 0.75) return defenseIndex;

      const attackIndex = player.hand.findIndex((card) => reel.getCardLane(card.type) === "attack");
      if (attackIndex >= 0) return attackIndex;

      const boostIndex = player.hand.findIndex((card) => reel.getCardLane(card.type) === "boost" && player.board.boost.some((slot) => !slot));
      if (boostIndex >= 0) return boostIndex;

      return player.hand.findIndex(Boolean);
    }

    function chooseAiTargetIndex(aiSeatIndex) {
      const candidates = state
        .map((player, index) => ({ player, index }))
        .filter(({ player, index }) => index !== aiSeatIndex && player.hp > 0);
      if (!candidates.length) return 0;
      candidates.sort((a, b) => a.player.hp - b.player.hp);
      return candidates[0].index;
    }

    function playAiTurn(seatIndex) {
      const player = state[seatIndex];
      if (!player || player.hp <= 0) {
        pushLog(`${player?.name || "玩家"} 無法行動。`);
        return;
      }

      let acted = false;
      const themeIndex = player.hand.findIndex((card) => isMainTheme(card) && player.board.theme.some((slot) => !slot));
      if (themeIndex >= 0) {
        placeThemeCard(player, themeIndex, null, { silentRender: true });
        acted = true;
      }

      const attackIndex = player.hand.findIndex((card) => reel.getCardLane(card.type) === "attack");
      if (attackIndex >= 0) {
        placeCard(player, attackIndex, chooseAiTargetIndex(seatIndex), { silentRender: true });
        acted = true;
      }

      if (acted) return;

      const cardIndex = chooseAiCardIndex(player);
      if (cardIndex < 0) {
        pushLog(`${player.name} 沒有可用手牌。`);
        return;
      }

      const card = player.hand[cardIndex];
      const lane = reel.getCardLane(card.type);
      const targetIndex = lane === "attack" ? chooseAiTargetIndex(seatIndex) : seatIndex;
      placeCard(player, cardIndex, targetIndex, { silentRender: true });
    }

    function advanceTurn() {
      if (state.filter((player) => player.hp > 0).length <= 1) {
        pushLog("對局結束，只剩一方仍能行動。");
        render();
        return;
      }

      const nextIndex = nextAliveSeatIndex(turnSeatIndex);
      if (nextIndex === 0 && turnSeatIndex !== 0) {
        round += 1;
      }
      beginTurn(nextIndex);
      render();
    }

    async function runAiTurnsUntilPlayer() {
      if (aiTurnRunning) return;
      aiTurnRunning = true;
      try {
        while (turnSeatIndex !== 0 && state[turnSeatIndex]?.hp > 0) {
          await new Promise((resolve) => setTimeout(resolve, 420));
          playAiTurn(turnSeatIndex);
          pushLog(`${currentTurnPlayer().name} 回合結束。`);
          advanceTurn();
        }
      } finally {
        aiTurnRunning = false;
        render();
      }
    }

    function endPlayerTurn() {
      if (aiTurnRunning) return;
      const player = currentTurnPlayer();
      if (!player) return;

      pushLog(`${player.name} 回合結束。`);
      advanceTurn();
      if (turnSeatIndex !== 0) {
        runAiTurnsUntilPlayer();
      }
    }

    function placeThemeCard(player, cardIndex, explicitSlotIndex = null, options = {}) {
      const card = player.hand[cardIndex];
      if (!isMainTheme(card)) return false;

      const slotIndex = explicitSlotIndex ?? player.board.theme.findIndex((slot) => !slot);
      if (slotIndex < 0 || slotIndex >= player.board.theme.length || player.board.theme[slotIndex]) {
        pushLog("S1-S3 已滿，請先棄置或調整地方主題卡。");
        render();
        return false;
      }

      const pointGain = themePointValue(card);
      const cashflowGain = themeCashflowValue(card);
      const visitorGain = themeVisitorFlowValue(card);
      player.board.theme[slotIndex] = {
        card,
        faceDown: false,
        triggered: true,
        note: `S${slotIndex + 1}`,
        pointGain,
        cashflowGain,
        visitorGain,
      };
      applyScores(player, card.scores, 1);
      player.points += pointGain;
      player.cashflow += cashflowGain;
      player.visitorFlow += visitorGain;
      player.hand.splice(cardIndex, 1);
      player.history.unshift(`${card.name} placed in S${slotIndex + 1}`);
      if (player.history.length > 6) player.history.length = 6;
      dealToFive(player);
      ensureOpeningThemeCard(player);
      pushLog(`${player.name} 放置 ${card.name} 到 S${slotIndex + 1}，點數 +${pointGain}，現金流 +${cashflowGain}，人流 +${visitorGain}。`);
      handCollapsed = false;
      selectedCardIndex = null;
      if (!options.silentRender) render();
      return true;
    }

    function placeCard(player, cardIndex, targetSeatIndex = focusSeatIndex, options = {}) {
      const card = player.hand[cardIndex];
      if (!card) return;

      if (isMainTheme(card)) {
        placeThemeCard(player, cardIndex, null, options);
        return;
      }

      const lane = reel.getCardLane(card.type);
      const target = state[targetSeatIndex];
      let result = `${player.name} played ${card.name} on ${target.name}.`;

      if (lane === "attack") {
        const slotIndex = target.board.attack.findIndex((slot) => !slot);
        if (slotIndex < 0) {
          pushLog(`${target.name} 的攻擊區已滿，無法放置 ${card.name}。`);
          if (!options.silentRender) render();
          return;
        }
        if (slotIndex >= 0) {
          target.board.attack[slotIndex] = {
            card,
            faceDown: false,
            triggered: true,
            note: `攻擊 ${slotIndex + 1}`,
          };
        }
        result = resolveAttack(target, card, player);
      } else if (lane === "defense") {
        const slotIndex = player.board.defense.findIndex((slot) => !slot);
        if (slotIndex < 0) {
          pushLog(`${player.name} 的防禦區已滿，無法放置 ${card.name}。`);
          if (!options.silentRender) render();
          return;
        }
        if (slotIndex >= 0) {
          player.board.defense[slotIndex] = {
            card,
            faceDown: true,
            triggered: false,
            note: `防禦 ${slotIndex + 1}`,
          };
          player.armor += card.effect?.block || 5;
        }
        result = `${player.name} placed defense ${card.name}.`;
      } else if (lane === "trap") {
        const slotIndex = player.board.trap.findIndex((slot) => !slot);
        if (slotIndex < 0) {
          pushLog(`${player.name} 的陷阱區已滿，無法放置 ${card.name}。`);
          if (!options.silentRender) render();
          return;
        }
        if (slotIndex >= 0) {
          player.board.trap[slotIndex] = {
            card,
            faceDown: true,
            triggered: false,
            note: "陷阱",
          };
        }
        result = `${player.name} placed trap ${card.name}.`;
      } else {
        const slotIndex = player.board.boost.findIndex((slot) => !slot);
        if (slotIndex < 0) {
          pushLog(`${player.name} 的加成區已滿，無法放置 ${card.name}。`);
          if (!options.silentRender) render();
          return;
        }
        if (slotIndex >= 0) {
          player.board.boost[slotIndex] = {
            card,
            faceDown: false,
            triggered: true,
            note: `加成 ${slotIndex + 1}`,
          };
        }
        applyResourceEffect(player, card.effect || { energy: 1 });
        result = `${player.name} placed boost ${card.name}.`;
      }

      player.hand.splice(cardIndex, 1);
      player.history.unshift(`${card.name} moved to the board`);
      if (player.history.length > 6) player.history.length = 6;

      dealToFive(player);
      ensureOpeningThemeCard(player);
      pushLog(result);
      handCollapsed = false;
      selectedCardIndex = null;
      if (!options.silentRender) render();
    }

    function placeSelectedHandCardAtDesk() {
      const self = state[0];
      if (selectedCardIndex === null) return false;
      if (selectedCardIndex < 0 || selectedCardIndex >= self.hand.length) {
        selectedCardIndex = null;
        return false;
      }

      const card = self.hand[selectedCardIndex];
      if (!card) return false;

      if (isMainTheme(card)) {
        return placeThemeCard(self, selectedCardIndex);
      }

      const lane = reel.getCardLane(card.type);
      if (lane === "attack") {
        placeCard(self, selectedCardIndex, focusSeatIndex === 0 ? 1 : focusSeatIndex);
      } else {
        placeCard(self, selectedCardIndex, 0);
      }
      handCollapsed = false;
      selectedCardIndex = null;
      return true;
    }

    function resolveAttack(target, card, source) {
      const damage = card.effect?.damage || 0;
      const trapSlot = target.board.trap[0];
      const defenseSlotIndex = target.board.defense.findIndex((slot) => slot && slot.faceDown);
      let blocked = 0;
      let notes = [];

      if (trapSlot && !trapSlot.triggered) {
        trapSlot.triggered = true;
        trapSlot.faceDown = false;
        notes.push(`${target.name}'s trap triggered.`);
        source.hp = Math.max(0, source.hp - (trapSlot.card.effect?.trapDamage || 3));
      }

      if (defenseSlotIndex >= 0) {
        const defenseSlot = target.board.defense[defenseSlotIndex];
        defenseSlot.faceDown = false;
        defenseSlot.triggered = true;
        blocked = defenseSlot.card.effect?.block || 5;
        notes.push(`${target.name}'s defense blocked damage.`);
      }

      const finalDamage = Math.max(0, damage - blocked);
      target.hp = Math.max(0, target.hp - finalDamage);
      target.history.unshift(`${card.name} dealt ${finalDamage} damage`);
      if (target.history.length > 6) target.history.length = 6;

      return `${source.name} attacked ${target.name} for ${damage} damage${blocked ? `, blocked ${blocked}` : ""}${notes.length ? ` (${notes.join(", ")})` : ""}.`;
    }

    function renderLaneCards(seatIndex, lane) {
      const player = state[seatIndex];
      let slotValue = null;
      if (lane.slot === "attack") {

        slotValue = player.board.boost[lane.slotIndex];

      if (!slotValue) {

      const card = slotValue.card;

      return `

          btn.onclick = (event) => {
            event.stopPropagation();
            discardBoardCard(self, item.key === "defense-1" ? { key: "defense-1", slot: "defense", slotIndex: 0, label: "防禦 1" }
              : item.key === "defense-2" ? { key: "defense-2", slot: "defense", slotIndex: 1, label: "防禦 2" }
              : item.key === "boost-1" ? { key: "boost-1", slot: "boost", slotIndex: 0, label: "加成 1" }
              : { key: "boost-2", slot: "boost", slotIndex: 1, label: "加成 2" });
          };
        }
        boardStack.appendChild(panel);
      });

      boardWrap.appendChild(boardStack);
      handWrap.appendChild(boardWrap);
      return handWrap;
    }

    function renderLog() {
      logEl.innerHTML = "";
      const entries = (window._log || []).slice(0, 12);
      if (!entries.length) {
        logEl.innerHTML = `<div class="log-entry">目前還沒有事件。</div>`;
        return;
      }
      entries.forEach((entry) => {
        const div = document.createElement("div");
        div.className = "log-entry";
        div.textContent = `[R${entry.round}] ${entry.message}`;
        logEl.appendChild(div);
      });
    }

    function renderBoardControls() {
      const bottomSlot = seatGrid.querySelector(".seat.bottom .self-cards");
      if (!bottomSlot) return;
      const existing = bottomSlot.querySelector(".hand-wrap");
      if (existing) existing.remove();
      bottomSlot.appendChild(renderHand());
    }

    function render() {
      layout.classList.toggle("hud-hidden", hudCollapsed);
      renderReel();
      renderSeats();
      renderBoardControls();
      renderThemeSlots();
      renderPlayerHud();
      renderShop();
      renderStatus();
      renderLog();
    }

    function updateSoundButton() {
      const isPlaying = bgmEnabled && !bgmAudio.paused;
      soundToggle.classList.toggle("playing", isPlaying);
      soundToggle.textContent = isPlaying ? "🔊" : "🔇";
      soundToggle.setAttribute("aria-label", isPlaying ? "關閉背景音樂" : "播放背景音樂");
      soundToggle.title = isPlaying ? "關閉背景音樂" : "播放背景音樂";
    }

    async function setBgmEnabled(enabled) {
      bgmEnabled = enabled;
      bgmAudio.volume = 0.45;

      if (!enabled) {
        bgmAudio.pause();
        updateSoundButton();
        return;
      }

      try {
        await bgmAudio.play();
      } catch (error) {
        bgmEnabled = false;
        pushLog("背景音樂需要玩家點擊喇叭後才會播放。");
      }
      updateSoundButton();
    }

    document.getElementById("btnZoomIn").addEventListener("click", () => updateZoomScale(zoomScale + 0.08));
    document.getElementById("btnZoomOut").addEventListener("click", () => updateZoomScale(zoomScale - 0.08));
    document.getElementById("btnResetView").addEventListener("click", () => {
      focusSeatIndex = 0;
      userRotation = 0;
      updateZoomScale(1);
    });
    document.getElementById("btnToggleHud").addEventListener("click", () => {
      hudCollapsed = !hudCollapsed;
      const button = document.getElementById("btnToggleHud");
      button.classList.toggle("active", !hudCollapsed);
      button.textContent = hudCollapsed ? "顯示" : "HUD";
      sidebar.classList.toggle("hidden", hudCollapsed);
      layout.classList.toggle("sidebar-hidden", hudCollapsed);
      render();
    });
    document.getElementById("btnEndTurn").addEventListener("click", endPlayerTurn);
    document.getElementById("btnAutoAI").addEventListener("click", autoAIPlay);
    soundToggle.addEventListener("click", () => {
      setBgmEnabled(!bgmEnabled);
    });
    bgmAudio.addEventListener("play", updateSoundButton);
    bgmAudio.addEventListener("pause", updateSoundButton);
    bgmAudio.volume = 0.45;

    function updateZoomScale(nextScale) {
      const clamped = clamp(nextScale, 0.9, 1.4);
      zoomScale = clamped;
      render();
    }

    function getDistance(a, b) {
      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    tableShell.addEventListener("pointerdown", (event) => {
      if (event.target.closest("button") || event.target.closest(".seat") || event.target.closest(".sidebar") || event.target.closest(".theme-slots") || event.target.closest(".shop-panel")) {
        return;
      }

      if (selectedCardIndex !== null && !event.target.closest(".slot") && !event.target.closest(".hand-wrap")) {
        const placed = placeSelectedHandCardAtDesk();
        if (placed) {
          event.preventDefault();
          return;
        }
      }

      tableShell.classList.add("dragging");
      tableShell.setPointerCapture(event.pointerId);
      activePointers.set(event.pointerId, event);

      if (activePointers.size === 1) {
        dragState.mode = "rotate";
        dragState.pointerId = event.pointerId;
        dragState.startX = event.clientX;
        dragState.baseRotation = userRotation;
      } else if (activePointers.size === 2) {
        const [first, second] = [...activePointers.values()];
        dragState.mode = "pinch";
        dragState.baseScale = zoomScale;
        dragState.baseDistance = getDistance(first, second);
      }

      event.preventDefault();
    });

    tableShell.addEventListener("pointermove", (event) => {
      if (!activePointers.has(event.pointerId)) return;
      activePointers.set(event.pointerId, event);

      if (dragState.mode === "rotate" && dragState.pointerId === event.pointerId) {
        const deltaX = event.clientX - dragState.startX;
        userRotation = dragState.baseRotation + deltaX * 0.25;
        render();
      } else if (dragState.mode === "pinch" && activePointers.size >= 2) {
        const [first, second] = [...activePointers.values()];
        const distance = getDistance(first, second);
        if (dragState.baseDistance > 0) {
          updateZoomScale(dragState.baseScale * (distance / dragState.baseDistance));
        }
      }

      event.preventDefault();
    });

    function endPointer(event) {
      activePointers.delete(event.pointerId);
      if (activePointers.size === 0) {
        dragState.mode = null;
        dragState.pointerId = null;
        tableShell.classList.remove("dragging");
      } else if (activePointers.size === 1) {
        const [remaining] = [...activePointers.values()];
        dragState.mode = "rotate";
        dragState.pointerId = remaining.pointerId;
        dragState.startX = remaining.clientX;
        dragState.baseRotation = userRotation;
      }
    }

    tableShell.addEventListener("pointerup", endPointer);
    tableShell.addEventListener("pointercancel", endPointer);
    tableShell.addEventListener("lostpointercapture", endPointer);

    tableShell.addEventListener("wheel", (event) => {
      event.preventDefault();
      const direction = Math.sign(event.deltaY);
      const step = event.deltaMode === 1 ? 0.05 : 0.025;
      updateZoomScale(zoomScale - direction * step);
    }, { passive: false });

    resetMatch();
    updateSoundButton();
  </script>
</body>
</html>
