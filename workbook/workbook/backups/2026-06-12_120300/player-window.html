<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Card Player Window</title>
  <style>
    :root {
      --bg-0: #020617;
      --bg-1: #08111f;
      --bg-2: #0f172a;
      --panel: rgba(10, 18, 32, 0.84);
      --panel-strong: rgba(8, 14, 26, 0.95);
      --line: rgba(148, 163, 184, 0.18);
      --line-strong: rgba(56, 189, 248, 0.5);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #f59e0b;
      --good: #22c55e;
      --hand-card: rgba(13, 20, 38, 0.98);
      --board-card: rgba(18, 28, 48, 0.96);
      --zoom: 1;
      --table-rotate: 0deg;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 26%),
        radial-gradient(circle at 80% 20%, rgba(245, 158, 11, 0.08), transparent 18%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1) 50%, var(--bg-2));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input { font: inherit; }

    .shell {
      min-height: 100vh;
      padding: 18px;
      display: grid;
      gap: 14px;
      grid-template-rows: auto auto 1fr;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 18px;
      backdrop-filter: blur(12px);
    }

    .title h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
    }

    .title p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
      max-width: 72ch;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .controls button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      color: white;
      background: linear-gradient(180deg, var(--accent), #0ea5e9);
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
    }

    .controls button.secondary {
      background: linear-gradient(180deg, #475569, #334155);
    }

    .controls label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .controls input[type="range"] { width: 160px; }

    .board-shell {
      position: relative;
      min-height: 720px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 14px;
    }

    .table-zone {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at center, rgba(2, 6, 23, 0.2), rgba(2, 6, 23, 0.84) 72%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.62), rgba(30, 41, 59, 0.16));
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
    }

    .table-core {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(68vw, 820px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%) scale(var(--zoom)) rotate(var(--table-rotate));
      transform-origin: center center;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(56, 189, 248, 0.08), rgba(11, 18, 32, 0.96) 64%, rgba(2, 6, 23, 1));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 40px 120px rgba(0, 0, 0, 0.32),
        0 0 100px rgba(56, 189, 248, 0.12);
      overflow: hidden;
      transition: transform 560ms cubic-bezier(0.22, 0.88, 0.24, 1);
    }

    .table-core::before {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 1px dashed rgba(148, 163, 184, 0.16);
      animation: reelPulse 8s linear infinite;
    }

    .table-core::after {
      content: "";
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(2, 6, 23, 0.75), rgba(2, 6, 23, 0.08) 70%, transparent 72%);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.12) inset;
    }

    .table-ring {
      position: absolute;
      inset: 9%;
      border-radius: 50%;
      border: 1px solid rgba(56, 189, 248, 0.08);
      box-shadow: inset 0 0 40px rgba(56, 189, 248, 0.06);
      animation: reelSpin 28s linear infinite;
      pointer-events: none;
    }

    @keyframes reelSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes reelPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .center-tag {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
      width: 210px;
      pointer-events: none;
    }

    .center-tag strong {
      display: block;
      font-size: 18px;
      letter-spacing: 0.08em;
    }

    .center-tag span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .seat {
      position: absolute;
      width: clamp(210px, 22vw, 280px);
      display: grid;
      gap: 10px;
      z-index: 3;
    }

    .seat.self { left: 50%; bottom: 18px; transform: translateX(-50%); }
    .seat.top { left: 50%; top: 18px; transform: translateX(-50%); }
    .seat.left { left: 18px; top: 50%; transform: translateY(-50%); }
    .seat.right { right: 18px; top: 50%; transform: translateY(-50%); }

    .seat-card {
      background: rgba(10, 18, 32, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
    }

    .seat.self .seat-card {
      background: linear-gradient(180deg, rgba(37, 99, 235, 0.14), rgba(8, 14, 26, 0.96));
      border-color: rgba(56, 189, 248, 0.32);
    }

    .seat-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 8px 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .lane-label {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .board-lanes {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .slot-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 40px;
    }

    .slot-card {
      min-width: 78px;
      max-width: 108px;
      border-radius: 12px;
      padding: 8px 9px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: var(--board-card);
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .slot-card small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.35;
    }

    .slot-card.attack { box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.16) inset; }
    .slot-card.defense { box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.16) inset; }
    .slot-card.trap { box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.18) inset; }
    .slot-card.back {
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(7, 12, 24, 0.96)),
        repeating-linear-gradient(45deg, rgba(56, 189, 248, 0.12) 0 7px, transparent 7px 14px);
    }

    .hand-zone {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .deck-note {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .deal-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 30px;
    }

    .deal-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(2, 6, 23, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.16);
      color: #dbeafe;
      font-size: 12px;
      animation: popIn 260ms ease;
    }

    @keyframes popIn {
      from { transform: translateY(4px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .hand {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 88px;
    }

    .hand-card {
      min-width: 124px;
      border-radius: 14px;
      padding: 10px 11px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: var(--hand-card);
      color: white;
      text-align: left;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .hand-card:hover {
      transform: translateY(-2px);
      border-color: rgba(56, 189, 248, 0.42);
    }

    .hand-card small {
      display: block;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.35;
    }

    .hand-card.pending {
      outline: 2px solid rgba(245, 158, 11, 0.72);
    }

    .side-panel {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(12px);
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .panel .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .log {
      display: grid;
      gap: 8px;
      overflow: auto;
      max-height: 420px;
      padding-right: 4px;
    }

    .log-entry {
      background: rgba(2, 6, 23, 0.76);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.45;
      color: #dbeafe;
      font-size: 13px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.7);
      z-index: 10;
    }

    .overlay.open { display: flex; }

    .zoom-card {
      width: min(92vw, 560px);
      background: rgba(2, 6, 23, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .zoom-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .zoom-head button {
      border: 0;
      background: #475569;
      color: white;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .zoom-body {
      display: grid;
      gap: 8px;
      color: #e2e8f0;
      line-height: 1.5;
    }

    @media (max-width: 1100px) {
      .board-shell { grid-template-columns: 1fr; }
      .side-panel { grid-template-rows: auto auto auto; }
      .seat.left, .seat.right {
        top: auto;
        bottom: 24%;
        transform: none;
      }
      .seat.left { left: 10px; }
      .seat.right { right: 10px; }
    }

    @media (max-width: 760px) {
      .shell { padding: 10px; }
      .header { flex-direction: column; }
      .controls { justify-content: flex-start; }
      .table-core { width: 92vw; }
      .seat.self, .seat.top, .seat.left, .seat.right {
        width: min(92vw, 440px);
        left: 50%;
        right: auto;
        transform: translateX(-50%);
      }
      .seat.top { top: 10px; }
      .seat.left { bottom: 42%; top: auto; }
      .seat.right { bottom: 28%; top: auto; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="title">
        <h1>Player Window</h1>
        <p>玩家版視窗只顯示自己能看到的資訊。牌卡會自動發放，桌面有 reel 轉動感，HUD 是第二層疊在桌台之上。</p>
      </div>
      <div class="controls">
        <button id="btnStart">重新開局</button>
        <button id="btnEndTurn" class="secondary">結束回合</button>
        <button id="btnResetZoom" class="secondary">重置視角</button>
        <label>
          視角縮放
          <input id="zoomSlider" type="range" min="0.82" max="1.3" step="0.01" value="1" />
        </label>
      </div>
    </header>

    <section class="board-shell">
      <div class="table-zone">
        <div class="table-core">
          <div class="table-ring"></div>
        </div>
        <div class="center-tag">
          <strong id="turnLabel">ROUND 1</strong>
          <span id="statusLabel">準備開始</span>
        </div>

        <div class="seat top" id="seatTop"></div>
        <div class="seat left" id="seatLeft"></div>
        <div class="seat right" id="seatRight"></div>
        <div class="seat self" id="seatSelf"></div>

        <div class="overlay" id="overlay">
          <div class="zoom-card">
            <div class="zoom-head">
              <div>
                <strong id="zoomTitle">Card</strong>
                <div id="zoomMeta" style="color:var(--muted); font-size:12px; margin-top:4px;"></div>
              </div>
              <button id="btnCloseZoom">關閉</button>
            </div>
            <div class="zoom-body" id="zoomBody"></div>
          </div>
        </div>
      </div>

      <aside class="side-panel">
        <div class="panel">
          <h2>玩家概況</h2>
          <div class="meta" id="playerMeta"></div>
        </div>
        <div class="panel">
          <h2>對局資訊</h2>
          <div class="meta" id="matchMeta"></div>
        </div>
        <div class="panel">
          <h2>事件紀錄</h2>
          <div class="log" id="log"></div>
        </div>
      </aside>
    </section>
  </div>

  <script src="../../card_bank/cards-data.js"></script>
  <script src="../sample-cards.js"></script>
  <script src="../table-battle-engine.js"></script>
  <script>
    const game = new TableBattleEngine(sampleCards, { handLimit: 7, drawPerTurn: 2, maxPlayers: 4 });
    game.addPlayer({ name: "你", isAI: false, seat: 0 });
    game.addPlayer({ name: "AI-1", isAI: true, seat: 1 });
    game.addPlayer({ name: "AI-2", isAI: true, seat: 2 });
    game.addPlayer({ name: "AI-3", isAI: true, seat: 3 });

    const zoomSlider = document.getElementById("zoomSlider");
    const btnStart = document.getElementById("btnStart");
    const btnEndTurn = document.getElementById("btnEndTurn");
    const btnResetZoom = document.getElementById("btnResetZoom");
    const turnLabel = document.getElementById("turnLabel");
    const statusLabel = document.getElementById("statusLabel");
    const playerMeta = document.getElementById("playerMeta");
    const matchMeta = document.getElementById("matchMeta");
    const logEl = document.getElementById("log");
    const seatSelf = document.getElementById("seatSelf");
    const seatTop = document.getElementById("seatTop");
    const seatLeft = document.getElementById("seatLeft");
    const seatRight = document.getElementById("seatRight");
    const overlay = document.getElementById("overlay");
    const zoomTitle = document.getElementById("zoomTitle");
    const zoomMeta = document.getElementById("zoomMeta");
    const zoomBody = document.getElementById("zoomBody");
    const btnCloseZoom = document.getElementById("btnCloseZoom");

    let pendingPlay = null;
    let lastHandCount = 0;
    let dealNotes = [];

    function cardMeta(card) {
      return `${card.type} · Cost ${card.cost} · ${card.rarity || "Common"}`;
    }

    function describeCard(card) {
      const lines = [];
      if (card.desc) lines.push(card.desc);
      if (card.effect) {
        lines.push(
          Object.entries(card.effect)
            .map(([key, value]) => `${key}: ${value}`)
            .join(", "),
        );
      }
      return lines;
    }

    function openZoom(card, extra = "") {
      overlay.classList.add("open");
      zoomTitle.textContent = card.name;
      zoomMeta.textContent = cardMeta(card);
      const lines = describeCard(card);
      if (extra) lines.push(extra);
      zoomBody.innerHTML = lines.map((line) => `<div>${line}</div>`).join("");
    }

    function closeZoom() {
      overlay.classList.remove("open");
    }

    function renderCardButton(card, index) {
      const btn = document.createElement("button");
      btn.className = `hand-card ${pendingPlay && pendingPlay.handIndex === index ? "pending" : ""}`;
      btn.innerHTML = `${card.name}<small>${cardMeta(card)}<br>${card.desc || ""}</small>`;
      btn.onclick = () => {
        if (card.type === "Attack" || card.type === "Debuff") {
          pendingPlay = { handIndex: index, cardId: card.id };
          render();
          return;
        }
        const current = game.getCurrentPlayer();
        game.playCard(current.id, index, current.id);
        pendingPlay = null;
        render();
      };
      return btn;
    }

    function renderBoardSeat(container, player, isSelf) {
      container.innerHTML = `
        <div class="seat-card">
          <div class="seat-head">
            <span>${player.name}${player.isAI ? " (AI)" : ""}</span>
            <span>${isSelf ? "SELF" : `P${player.seat + 1}`}</span>
          </div>
          <div class="stats">
            <div>HP ${player.hp}/${player.maxHp}</div>
            <div>Armor ${player.armor}</div>
            <div>Energy ${player.energy}</div>
            <div>Poison ${player.statuses.poison}</div>
            <div>Vulnerable ${player.statuses.vulnerable}</div>
            <div>Shield ${player.statuses.shieldNext}</div>
          </div>
          <div class="board-lanes">
            <div class="lane">
              <div class="lane-label"><span>attack</span><span>${player.board.attack.length}</span></div>
              <div class="slot-row">
                ${player.board.attack.map((card) => `
                  <button class="slot-card attack" data-open='${encodeURIComponent(JSON.stringify(card))}'>
                    ${card.name}
                    <small>${cardMeta(card)}</small>
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="lane">
              <div class="lane-label"><span>defense</span><span>${player.board.defense.length}</span></div>
              <div class="slot-row">
                ${player.board.defense.map((card) => `
                  <button class="slot-card defense" data-open='${encodeURIComponent(JSON.stringify(card))}'>
                    ${card.name}
                    <small>${cardMeta(card)}</small>
                  </button>
                `).join("")}
              </div>
            </div>
            <div class="lane">
              <div class="lane-label"><span>trap</span><span>${player.board.front.traps.length}</span></div>
              <div class="slot-row">
                ${player.board.front.traps.map((card) => `
                  <button class="slot-card back trap" data-open='${encodeURIComponent(JSON.stringify(card))}'>
                    ???
                    <small>Hidden trap</small>
                  </button>
                `).join("")}
              </div>
            </div>
          </div>
          ${isSelf ? `
            <div class="hand-zone">
              <div class="deck-note">
                <span>Auto-dealt hand</span>
                <span id="handCountLabel">${player.hand.length} cards</span>
              </div>
              <div class="deal-strip" id="dealStrip"></div>
              <div class="lane-label"><span>hand</span><span>${player.hand.length}</span></div>
              <div class="hand" id="handArea"></div>
            </div>
          ` : `
            <div class="hand-zone">
              <div class="lane-label"><span>hand</span><span>${player.hand.length}</span></div>
              <div class="meta">只顯示張數，不顯示內容</div>
            </div>
          `}
        </div>
      `;

      container.querySelectorAll("[data-open]").forEach((button) => {
        button.addEventListener("click", () => {
          const card = JSON.parse(decodeURIComponent(button.dataset.open));
          openZoom(card, `${player.name} 的公開區域`);
        });
      });

      if (isSelf) {
        const handArea = container.querySelector("#handArea");
        const dealStrip = container.querySelector("#dealStrip");
        const handCountLabel = container.querySelector("#handCountLabel");
        if (handArea) {
          player.hand.forEach((card, index) => handArea.appendChild(renderCardButton(card, index)));
        }
        if (dealStrip && dealNotes.length) {
          dealStrip.innerHTML = dealNotes.slice(-4).map((note) => `<span class="deal-chip">${note}</span>`).join("");
        }
        if (handCountLabel) {
          handCountLabel.textContent = `${player.hand.length} cards`;
        }
      }
    }

    function syncAutoDealNotes(currentHandCount) {
      if (currentHandCount > lastHandCount) {
        const delta = currentHandCount - lastHandCount;
        dealNotes.push(`Auto dealt +${delta}`);
      }
      lastHandCount = currentHandCount;
    }

    function render() {
      const current = game.getCurrentPlayer();
      const snapshot = game.snapshot();
      const self = game.players[0];
      const top = game.players[2];
      const left = game.players[1];
      const right = game.players[3];

      document.documentElement.style.setProperty("--zoom", zoomSlider.value);
      document.documentElement.style.setProperty("--table-rotate", `${snapshot.turnIndex * 90}deg`);

      syncAutoDealNotes(self.hand.length);

      renderBoardSeat(seatSelf, self, true);
      renderBoardSeat(seatTop, top, false);
      renderBoardSeat(seatLeft, left, false);
      renderBoardSeat(seatRight, right, false);

      turnLabel.textContent = `ROUND ${snapshot.round}`;
      statusLabel.textContent = snapshot.matchOver
        ? "對局結束"
        : `現在輪到 ${current ? current.name : "-"}`;

      playerMeta.textContent = [
        `你的位置：P1`,
        `手牌：${self.hand.length}`,
        `前場：攻擊 ${self.board.attack.length} / 防禦 ${self.board.defense.length} / 陷阱 ${self.board.front.traps.length}`,
      ].join(" | ");

      matchMeta.textContent = [
        `目前回合：${snapshot.round}`,
        `目前輪次：${current ? current.name : "-"}`,
        `總玩家數：${game.players.length}`,
        `桌面效果：reel rotation`,
      ].join(" | ");

      logEl.innerHTML = snapshot.log.slice(-14).map((entry) => `
        <div class="log-entry">[R${entry.round}] ${entry.message}</div>
      `).join("");
    }

    function startGame() {
      pendingPlay = null;
      closeZoom();
      dealNotes = ["Deal start"];
      lastHandCount = 0;
      game.startMatch();
      game.startTurn();
      render();
    }

    btnStart.addEventListener("click", startGame);
    btnEndTurn.addEventListener("click", () => {
      if (game.matchOver) return;
      pendingPlay = null;
      game.endTurn();
      dealNotes.push("Turn advanced");
      render();
    });
    btnResetZoom.addEventListener("click", () => {
      zoomSlider.value = "1";
      render();
    });
    zoomSlider.addEventListener("input", render);
    btnCloseZoom.addEventListener("click", closeZoom);
    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) closeZoom();
    });

    startGame();
  </script>
</body>
</html>
