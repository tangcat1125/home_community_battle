<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愛我家鄉 - 社區營造大作戰</title>
  <style>
    :root {
      --ink: #17324a;
      --paper: rgba(255, 255, 255, 0.82);
      --panel: rgba(255, 255, 255, 0.92);
      --blue: #1378b8;
      --green: #198754;
      --gold: #f2b84b;
      --orange: #d97912;
      --shadow: 0 26px 70px rgba(23, 50, 74, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        linear-gradient(180deg, rgba(236, 250, 255, 0.14), rgba(43, 172, 213, 0.18)),
        url("assets/taiwan-community-table-map.png") center / cover fixed no-repeat;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.5) 48%, rgba(255, 255, 255, 0.18)),
        radial-gradient(circle at 12% 8%, rgba(255, 255, 255, 0.7), transparent 18%),
        radial-gradient(circle at 82% 8%, rgba(231, 255, 250, 0.58), transparent 20%);
      pointer-events: none;
    }

    .entry {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(520px, 1.12fr) minmax(460px, 0.86fr);
      gap: clamp(28px, 3.8vw, 64px);
      align-items: center;
      padding: clamp(28px, 3.2vw, 56px);
    }

    .hero,
    .setup-panel {
      border: 1px solid rgba(255, 255, 255, 0.68);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .hero {
      min-height: min(82vh, 650px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-radius: 36px;
      padding: clamp(42px, 5vw, 72px);
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      padding: 11px 17px;
      border-radius: 999px;
      background: rgba(198, 231, 244, 0.82);
      color: #075985;
      font-weight: 900;
      letter-spacing: 0.04em;
      font-size: clamp(14px, 1.1vw, 18px);
    }

    h1 {
      margin: 28px 0 16px;
      font-size: clamp(56px, 5.8vw, 94px);
      line-height: 1.02;
      letter-spacing: 0;
      color: #112d46;
    }

    .subtitle {
      margin: 0;
      color: #0f766e;
      font-size: clamp(24px, 2.25vw, 36px);
      font-weight: 900;
    }

    .description {
      max-width: 760px;
      color: #31556f;
      font-size: clamp(17px, 1.25vw, 22px);
      line-height: 1.75;
      margin-top: 28px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .guide-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      border-radius: 18px;
      padding: 14px 28px;
      color: white;
      background: linear-gradient(180deg, #7aa3ca, #486982);
      box-shadow: 0 16px 34px rgba(50, 83, 111, 0.28);
      font-size: 17px;
      font-weight: 1000;
      cursor: pointer;
      text-decoration: none;
    }

    .setup-panel {
      border-radius: 34px;
      padding: clamp(28px, 3.2vw, 44px);
      max-height: calc(100vh - 52px);
      overflow: auto;
    }

    .setup-panel h2 {
      margin: 0 0 8px;
      font-size: clamp(38px, 3.7vw, 56px);
      line-height: 1.05;
      color: #112d46;
    }

    .setup-copy {
      color: #42657e;
      line-height: 1.65;
      margin: 0 0 22px;
      font-size: clamp(15px, 1.1vw, 18px);
    }

    .setup-block { margin-top: 16px; }

    .setup-block.player-count-block,
    .condition-list,
    .preview {
      display: none;
    }

    .setup-label {
      margin-bottom: 12px;
      color: #345a74;
      font-size: 17px;
      font-weight: 1000;
      letter-spacing: 0;
    }

    .player-count-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .condition-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    button {
      border: 0;
      min-height: 58px;
      border-radius: 18px;
      padding: 14px 18px;
      color: white;
      background: linear-gradient(180deg, #2fb7ff, var(--blue));
      box-shadow: 0 16px 34px rgba(19, 120, 184, 0.24);
      cursor: pointer;
      font-size: 17px;
      font-weight: 1000;
      text-decoration: none;
      touch-action: manipulation;
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    button.ghost {
      background: linear-gradient(180deg, #7aa2c8, #49677f);
    }

    button.active {
      background: linear-gradient(180deg, #25b47e, var(--green));
      box-shadow: 0 16px 34px rgba(25, 135, 84, 0.24);
    }

    .seat-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .seat-card {
      border-radius: 22px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(23, 50, 74, 0.12);
      box-shadow: 0 12px 30px rgba(23, 50, 74, 0.08);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .seat-card.inactive {
      opacity: 0.62;
      background: rgba(236, 244, 250, 0.78);
    }

    .seat-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      font-weight: 1000;
      font-size: 18px;
    }

    .seat-head span:last-child {
      color: #63829a;
      font-size: 14px;
    }

    .role-toggle {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .role-toggle label {
      display: grid;
      place-items: center;
      min-height: 64px;
      border-radius: 17px;
      border: 2px solid rgba(67, 164, 217, 0.22);
      background: rgba(240, 248, 255, 0.92);
      cursor: pointer;
      font-weight: 1000;
      color: #17324a;
      font-size: 17px;
    }

    .role-toggle label:has(input:checked) {
      color: white;
      border-color: transparent;
      background: linear-gradient(180deg, #25b47e, var(--green));
      box-shadow: 0 12px 24px rgba(25, 135, 84, 0.22);
    }

    .role-toggle label.ai:has(input:checked) {
      background: linear-gradient(180deg, #2fb7ff, var(--blue));
      box-shadow: 0 12px 24px rgba(19, 120, 184, 0.22);
    }

    .role-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .condition-pill {
      min-height: 86px;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255, 248, 224, 0.9);
      border: 1px solid rgba(242, 184, 75, 0.4);
      display: grid;
      gap: 5px;
      align-content: center;
    }

    .condition-pill strong {
      font-size: 22px;
      color: #9a4d00;
    }

    .condition-pill span {
      color: #49677f;
      font-weight: 800;
      line-height: 1.45;
    }

    .preview {
      margin: 18px 0;
      padding: 15px 17px;
      border-radius: 20px;
      background: rgba(232, 250, 255, 0.9);
      border: 1px solid rgba(19, 120, 184, 0.22);
      line-height: 1.6;
    }

    .start-button {
      width: 100%;
      min-height: 84px;
      margin-top: 18px;
      border-radius: 18px;
      font-size: clamp(24px, 2vw, 32px);
      background: linear-gradient(180deg, #35b5f2, #1587c9);
    }

    .footer {
      position: fixed;
      right: 18px;
      bottom: 14px;
      z-index: 2;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: #24455f;
      font-size: 13px;
      font-weight: 900;
      backdrop-filter: blur(8px);
    }

    .game-shell {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      background: #030712;
    }

    .game-shell.open {
      display: block;
    }

    .game-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #030712;
    }

    .return-setup {
      position: fixed;
      right: 16px;
      top: 16px;
      z-index: 11;
      min-height: 42px;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 14px;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
    }

    body.game-active {
      overflow: hidden;
    }

    body.game-active .entry,
    body.game-active .footer {
      display: none;
    }

    @media (max-width: 980px) {
      body { background-attachment: scroll; }
      .entry {
        grid-template-columns: 1fr;
        align-items: start;
        padding: 18px;
      }
      .setup-panel { max-height: none; }
      .hero {
        min-height: auto;
      }
      .seat-list {
        grid-template-columns: 1fr;
      }
      .player-count-row,
      .condition-list {
        grid-template-columns: 1fr;
      }
      .footer {
        position: static;
        margin: 14px 18px 18px;
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="entry">
    <section class="hero" aria-label="遊戲介紹">
      <div class="badge">觸碰大螢幕｜老師開局</div>
      <h1>愛我家鄉<br>社區營造大作戰</h1>
      <p class="subtitle">讓家鄉被看見，也讓家鄉住得下去。</p>
      <p class="description">
        老師先設定真人玩家與 AI 代玩，學生再用主線卡、經營卡、攻擊卡、防禦卡、陷阱與加成，
        在觀光、收入、文化、生態、民心與效率之間做取捨。
      </p>
      <div class="hero-actions">
        <a class="guide-button" id="openGuide" href="guide-page.html">開啟卡牌攻防教學說明頁</a>
      </div>
    </section>

    <section class="setup-panel" aria-label="開局設定">
      <h2>開局設定</h2>
      <p class="setup-copy">小校可以只保留一位真人玩家，其餘座位交給 AI 代玩，仍然能跑完整四方局。</p>

      <div class="setup-block player-count-block">
        <div class="setup-label">玩家數</div>
        <div class="player-count-row" aria-label="玩家數">
          <button class="ghost" type="button" data-player-count="1">1 位玩家</button>
          <button class="ghost" type="button" data-player-count="2">2 位玩家</button>
          <button class="ghost" type="button" data-player-count="3">3 位玩家</button>
          <button class="ghost active" type="button" data-player-count="4">4 位玩家</button>
        </div>
      </div>

      <div class="setup-block">
        <div class="setup-label">座位與 AI 代玩</div>
        <div class="seat-list">
          <article class="seat-card">
            <div class="seat-head"><span>你 / P1</span><span>底部座位</span></div>
            <div class="role-toggle" data-seat="0">
              <label><input type="radio" name="seat0" value="human" checked><span>真人玩家</span></label>
              <label class="ai"><input type="radio" name="seat0" value="ai"><span>AI 代玩</span></label>
            </div>
          </article>

          <article class="seat-card">
            <div class="seat-head"><span>右手 / P2</span><span>右側座位</span></div>
            <div class="role-toggle" data-seat="1">
              <label><input type="radio" name="seat1" value="human"><span>真人玩家</span></label>
              <label class="ai"><input type="radio" name="seat1" value="ai" checked><span>AI 代玩</span></label>
            </div>
          </article>

          <article class="seat-card">
            <div class="seat-head"><span>左手 / P3</span><span>左側座位</span></div>
            <div class="role-toggle" data-seat="2">
              <label><input type="radio" name="seat2" value="human"><span>真人玩家</span></label>
              <label class="ai"><input type="radio" name="seat2" value="ai" checked><span>AI 代玩</span></label>
            </div>
          </article>

          <article class="seat-card">
            <div class="seat-head"><span>對家 / P4</span><span>上方座位</span></div>
            <div class="role-toggle" data-seat="3">
              <label><input type="radio" name="seat3" value="human"><span>真人玩家</span></label>
              <label class="ai"><input type="radio" name="seat3" value="ai" checked><span>AI 代玩</span></label>
            </div>
          </article>
        </div>
      </div>

      <div class="setup-block">
        <div class="setup-label">勝負條件</div>
        <div class="condition-list">
          <div class="condition-pill">
            <strong>30 分鐘</strong>
            <span>時間結束或社區倒閉時結算。</span>
          </div>
          <div class="condition-pill">
            <strong>玩家倒閉</strong>
            <span>健康值、資源與收入都會影響勝負。</span>
          </div>
        </div>
      </div>

      <div class="preview" style="display: none;">
        <strong>目前設定</strong>
        <div id="setupPreview"></div>
      </div>

      <button class="start-button" id="startGame" type="button">開始遊戲</button>
    </section>
  </main>


  <section class="game-shell" id="gameShell" aria-label="遊戲視窗">
    <button class="return-setup" id="returnSetup" type="button">結束遊戲</button>
    <iframe class="game-frame" id="gameFrame" title="愛我家鄉遊戲主畫面"></iframe>
  </section>

  <script>
    const seats = [
      { name: "你 / P1", short: "P1" },
      { name: "右手 / P2", short: "P2" },
      { name: "左手 / P3", short: "P3" },
      { name: "對家 / P4", short: "P4" },
    ];
    let playerCount = 4;

    function seatRole(index) {
      if (index >= playerCount) return "ai";
      const checked = document.querySelector(`input[name="seat${index}"]:checked`);
      return checked?.value || "ai";
    }

    function currentRoles() {
      return seats.map((_, index) => seatRole(index));
    }

    function setSeatRole(index, role) {
      const input = document.querySelector(`input[name="seat${index}"][value="${role}"]`);
      if (input) input.checked = true;
    }

    function updateSeatAvailability() {
      document.querySelectorAll(".seat-card").forEach((card, index) => {
        const active = index < playerCount;
        card.classList.toggle("inactive", !active);
        card.querySelectorAll("input").forEach((input) => {
          input.disabled = !active;
        });
        if (!active) setSeatRole(index, "ai");
      });
    }

    function setPlayerCount(count) {
      playerCount = Number(count);
      document.querySelectorAll("[data-player-count]").forEach((button) => {
        button.classList.toggle("active", Number(button.dataset.playerCount) === playerCount);
      });
      for (let index = 0; index < seats.length; index += 1) {
        if (index === 0 && index < playerCount) setSeatRole(index, "human");
        if (index > 0) setSeatRole(index, "ai");
      }
      updatePreview();
    }

    function updatePreview() {
      updateSeatAvailability();
      const roles = currentRoles();
      const activeRoles = roles.slice(0, playerCount);
      const humanCount = activeRoles.filter((role) => role === "human").length;
      const aiCount = roles.filter((role) => role === "ai").length;
      const lines = seats.map((seat, index) => {
        const role = roles[index] === "human" ? "真人玩家" : "AI 代玩";
        return `${seat.name}：${role}`;
      });
      document.getElementById("setupPreview").innerHTML = `
        <div>真人 ${humanCount} 位，AI ${aiCount} 位。遊戲時間 30 分鐘，倒閉或時間結束時結算。</div>
        <div>${lines.join("｜")}</div>
      `;
    }

    function launchGame() {
      const params = new URLSearchParams({
        seats: currentRoles().join(","),
        playerCount: String(playerCount),
        teacherSetup: "1",
        mode: "touchscreen",
        winCondition: "30min-bankruptcy",
      });
      const frame = document.getElementById("gameFrame");
      frame.src = `player_window/player-window.html?${params.toString()}`;
      document.body.classList.add("game-active");
      document.getElementById("gameShell").classList.add("open");
      window.history.replaceState(null, "", window.location.pathname.split("/").pop() || "index.html");
    }

    document.querySelectorAll("[data-player-count]").forEach((button) => {
      button.addEventListener("click", () => setPlayerCount(button.dataset.playerCount));
    });

    document.querySelectorAll('input[type="radio"]').forEach((input) => {
      input.addEventListener("change", updatePreview);
    });

    document.getElementById("startGame").addEventListener("click", launchGame);
    document.getElementById("returnSetup").addEventListener("click", () => {
      const frame = document.getElementById("gameFrame");
      const payload = {
        type: "homeCommunityBattle:endGame",
        reason: "老師手動結束遊戲",
      };
      try {
        if (typeof frame.contentWindow?.endHomeCommunityBattle === "function") {
          frame.contentWindow.endHomeCommunityBattle(payload.reason);
          return;
        }
      } catch (error) {
        console.warn("Direct end-game call failed, falling back to postMessage.", error);
      }
      frame.contentWindow?.postMessage(payload, "*");
    });

    setPlayerCount(4);
  </script>
</body>
</html>
