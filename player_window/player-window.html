    function checkGameEnd() {
      if (gameEnded) return true;
      if (Date.now() - gameStartAt >= GAME_DURATION_MS) {
        endGame("30 分鐘遊戲時間結束");
        return true;
      }
      const bankrupt = state.find((player) => isBankrupt(player));
      if (bankrupt) {
        endGame(`${bankrupt.name} 倒閉`);
        return true;
      }
      if (activePlayers().length <= 1) {
        endGame("只剩一位玩家仍能營運");
        return true;
      }
      return false;
    }

    const state = seatOrder.map((seatKey, seatIndex) => createPlayer(seatKey, seatIndex));

    function createDeck() {
      const deck = [];
      extendedCards.forEach((card, idx) => {
        if (card.type === "MainTheme") return;
        const copyCount = card.type === "Attack" ? 2 : card.type === "Utility" || card.type === "Heal" || card.type === "Defense" ? 4 : 3;
        for (let i = 0; i < copyCount; i += 1) {
          deck.push(cloneCard(card, `${idx}_${i}`));
        }
      });
      return shuffle(deck);
    }

    function createEmptyBoard() {
      return {
        trap: [null],
        boost: [null, null],
        attack: [null, null, null],
        defense: [null, null],
        theme: [null, null, null, null],
      };
    }

    function getAiProfileKey(seatIndex) {
      return aiProfileOrder[Math.max(0, seatIndex - 1) % aiProfileOrder.length];
    }

    function createPlayer(seatKey, seatIndex) {
      const role = seatRoles[seatIndex] || "ai";
      const aiProfileKey = role === "ai" ? getAiProfileKey(seatIndex) : null;
      return {
        seatKey,
        seatIndex,
        id: seatKey,
        name: reel.getSeatLabel(seatIndex),
        role,
        isAI: role === "ai",
        aiProfileKey,
        aiProfileLabel: aiProfileKey ? aiProfiles[aiProfileKey].label : "玩家本人",
        hp: 100,
        maxHp: 100,
        armor: 0,
        energy: 3,
        maxEnergy: 3,
        points: 5,
        cashflow: 0,
        visitorFlow: 0,
        monthlyVisitors: 120,
        money: 5,
        luck: 0,
        population: 3,
        manpower: 3,
        time: 3,
        tech: 2,
        scores: {
          income: 0,
          tourism: 0,
          culture: 0,
          ecology: 0,
          publicSupport: 0,
        },
        deck: createDeck(),
        hand: [],
        discardPile: [],
        graveyard: [],
        board: createEmptyBoard(),
        stats: {
          turnsTaken: 0,
          themesPlaced: 0,
          boostsPlayed: 0,
          attacksMade: 0,
          defensesPlaced: 0,
          defensesTriggered: 0,
          trapsPlaced: 0,
          trapsTriggered: 0,
          cardsBought: 0,
          cashCollected: 0,
          damageDealt: 0,
          damageTaken: 0,
          openingThemeGranted: false,
        },
        history: [],
      };
    }

    function cloneCard(card, suffix = "copy") {
      return {
        ...card,
        effect: card.effect ? { ...card.effect } : undefined,
        scores: card.scores ? { ...card.scores } : undefined,
        instanceId: `${card.id}_${suffix}_${Math.random().toString(36).slice(2, 8)}`,
      };
    }

    function isMainTheme(card) {
      return card?.type === "MainTheme";
    }

    function themePointValue(card) {
      return Object.values(card?.scores || {}).reduce((sum, value) => sum + Number(value || 0), 0);
    }

    function themeCashflowValue(card) {
      const scores = card?.scores || {};
      const income = Number(scores.income || 0);
      const tourism = Number(scores.tourism || 0);
      return Math.max(1, income + Math.floor(tourism / 2));
    }

    function themeVisitorFlowValue(card) {
      const scores = card?.scores || {};
      const tourism = Number(scores.tourism || 0);
      const income = Number(scores.income || 0);
      const culture = Number(scores.culture || 0);
      return Math.max(80, tourism * 180 + income * 70 + culture * 45);
    }

    function currentMonthlyVisitors(player) {
      return Math.max(0, player.monthlyVisitors + player.visitorFlow + player.scores.tourism * 60);
    }

    function hasActiveStorm(player) {
      return stormEffects.some((effect) => effect.seatIndex === player.seatIndex && effect.untilTurn >= turnCounter);
    }

    function clearStormForPlayer(player, reason = "防禦成功") {
      const before = stormEffects.length;
      stormEffects = stormEffects.filter((effect) => effect.seatIndex !== player.seatIndex);
      return before !== stormEffects.length ? reason : "";
    }

    function expireStormEffects() {
      const before = stormEffects.length;
      stormEffects = stormEffects.filter((effect) => effect.untilTurn >= turnCounter);
      return before - stormEffects.length;
    }

    function addStormEffect(player, strength = 1, source = "attack") {
      stormEffects = stormEffects.filter((effect) => effect.untilTurn >= turnCounter);
      const existing = stormEffects.find((effect) => effect.seatIndex === player.seatIndex);
      if (existing) {
        existing.strength = Math.min(4, existing.strength + strength);
        existing.untilTurn = Math.max(existing.untilTurn, turnCounter + 2);
        existing.source = source;
        return;
      }
      stormEffects.push({
        seatIndex: player.seatIndex,
        strength,
        source,
        untilTurn: turnCounter + 2,
      });
      playSfx("storm");
    }

    function shiftVisitorsAway(sourcePlayer, amount, attacker = null) {
      const loss = Math.max(0, Math.min(sourcePlayer.visitorFlow, amount));
      if (loss <= 0) return 0;
      sourcePlayer.visitorFlow -= loss;
      const receivers = state.filter((player) => player.id !== sourcePlayer.id && !isBankrupt(player) && !hasActiveStorm(player));
      if (!receivers.length) return loss;
      const share = Math.max(1, Math.floor(loss / receivers.length));
      receivers.forEach((player) => {
        const bonus = attacker && player.id === attacker.id ? Math.max(1, Math.floor(share * 0.5)) : share;
        player.visitorFlow += bonus;
      });
      return loss;
    }

    function clearBoardForDisaster(player, disasterName) {
      const boardCards = [
        ...player.board.attack,
        ...player.board.defense,
        ...player.board.trap,
        ...player.board.boost,
        ...player.board.theme,
      ].filter(Boolean);
      boardCards.forEach((slot) => pushGraveyard(player, slot.card, disasterName));
      player.board.theme.filter(Boolean).forEach((slot) => {
        const card = slot.card;
        player.cashflow = Math.max(0, player.cashflow - themeCashflowValue(card));
        player.visitorFlow = Math.max(0, player.visitorFlow - themeVisitorFlowValue(card));
        applyScores(player, card.scores, -1);
      });
      player.board.attack = [null, null, null];
      player.board.defense = [null, null];
      player.board.trap = [null];
      player.board.boost = [null, null];
      player.board.theme = [null, null, null, null];
      player.armor = 0;
      return boardCards.length;
    }

    function triggerDisaster(kind) {
      const name = kind === "typhoon" ? "颱風" : "地震";
      let flippedCards = 0;
      state.forEach((player) => {
        if (isBankrupt(player)) return;
        flippedCards += clearBoardForDisaster(player, name);
        player.visitorFlow = Math.floor(Math.max(0, player.visitorFlow) / 2);
        player.monthlyVisitors = Math.floor(Math.max(0, player.monthlyVisitors) / 2);
        addStormEffect(player, kind === "typhoon" ? 2 : 1, kind);
        player.history.unshift(`${name} 掀翻桌牌，遊客減半`);
        if (player.history.length > 6) player.history.length = 6;
      });
      playSfx("disaster");
      pushLog(`${name} 隨機發生！全場桌牌被掀掉 ${flippedCards} 張，所有社區遊客減半。`);
    }

    function maybeTriggerDisaster() {
      if (round <= 1) return false;
      const roll = Math.random();
      if (roll < 0.055) {
        triggerDisaster("earthquake");
        return true;
      }
      if (roll < 0.11) {
        triggerDisaster("typhoon");
        return true;
      }
      return false;
    }

    function isPlayerInCrisis(player) {
      if (!player) return false;
      return player.hp <= 40
        || player.money <= 1
        || player.points <= 1
        || player.cashflow < 0
        || player.scores.ecology < 0
        || player.scores.publicSupport < 0;
    }

    function baseShopCost(card) {
      if (isMainTheme(card)) return Math.max(5, themePointValue(card) + 2);
      return Math.max(2, Number(card?.shopCost || 0) || Number(card?.cost || 0) + 2);
    }

    function getShopOffer(card, player) {
      const base = baseShopCost(card);
      const firstPurchase = (player?.stats?.cardsBought || 0) === 0;
      const crisis = isPlayerInCrisis(player);
      let cost = base;
      let label = "一般價格";
      let state = "";

      if (firstPurchase) {
        cost = Math.max(1, Math.ceil(base * 0.5));
        label = "首購大特價";
        state = "discount";
      }

      if (crisis) {
        cost = Math.max(cost + 2, Math.ceil(base * 1.5));
        label = firstPurchase ? "危機漲價" : "危機漲價";
        state = "crisis";
      }

      return { base, cost, label, state };
    }

    function applyScores(player, scores = {}, direction = 1) {
      Object.keys(scoreLabels).forEach((key) => {
        player.scores[key] += Number(scores[key] || 0) * direction;
      });
    }

    function applyResourceEffect(player, effect = {}) {
      Object.keys(resourceLabels).forEach((key) => {
        if (effect[key]) {
          player[key] += Number(effect[key]);
        }
      });

      const scoreEffect = {};
      Object.keys(scoreLabels).forEach((key) => {
        if (effect[key]) scoreEffect[key] = effect[key];
      });
      applyScores(player, scoreEffect, 1);

      player.energy = Math.min(player.maxEnergy + 2, player.energy + (effect.energy || 0));
      player.hp = Math.min(player.maxHp, player.hp + (effect.heal || 0));
    }

    function shuffle(items) {
      const array = [...items];
      for (let i = array.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function dealToFive(player) {
      while (player.hand.length < 5 && player.deck.length > 0) {
        player.hand.push(player.deck.pop());
      }
    }

    function ensureOpeningThemeCard(player) {
      if (player.stats.openingThemeGranted) return;
      if (player.hand.some(isMainTheme) || player.board.theme.some((slot) => slot?.card)) return;
      if (!mainThemeCards.length) return;
      const themeCard = cloneCard(mainThemeCards[(player.seatIndex + round + turnCounter) % mainThemeCards.length], `opening_theme_${player.id}`);
      const replaceIndex = player.hand.findIndex((card) => !isMainTheme(card));
      if (replaceIndex >= 0) {
        player.discardPile.unshift(player.hand[replaceIndex]);
        player.hand[replaceIndex] = themeCard;
      } else if (player.hand.length < 5) {
        player.hand.push(themeCard);
      }
      player.stats.openingThemeGranted = true;
    }

    function buildShopMarket() {
      const rareThemeChance = Math.random() < 0.06;
      const rareTheme = rareThemeChance ? shuffle(mainThemeCards.filter((card) => card.image)).slice(0, 1) : [];
      const supportCards = shuffle(extendedCards.filter((card) => card.type !== "Attack" && !isMainTheme(card) && card.image)).slice(0, 3);
      const attackCards = shuffle(extendedCards.filter((card) => card.type === "Attack" && card.image)).slice(0, 1);
      const fallback = shuffle(extendedCards.filter((card) => !isMainTheme(card) && card.image)).slice(0, Math.max(0, 4 - rareTheme.length - supportCards.length - attackCards.length));
      shopMarket = shuffle([...rareTheme, ...supportCards, ...attackCards, ...fallback])
        .slice(0, 4)
        .map((card, index) => cloneCard(card, `shop_${turnCounter}_${index}`));
    }

    function buyShopCard(index) {
      const self = currentControlPlayer();
      const card = shopMarket[index];
      if (!card) return;

      const offer = getShopOffer(card, self);
      const cost = offer.cost;
      if (self.points < cost) {
        pushLog(`點數不足，無法購買 ${card.name}。`);
        render();
        return;
      }

      self.points -= cost;
      const bought = cloneCard(card, `bought_${Date.now()}`);
      self.stats.cardsBought += 1;
      if (self.hand.length < 5) {
        self.hand.push(bought);
        pushLog(`${self.name} 用 ${cost} 點購買 ${card.name}，加入手牌。`);
      } else {
        self.discardPile.unshift(bought);
        pushLog(`${self.name} 用 ${cost} 點購買 ${card.name}，手牌已滿，先放入棄牌堆。`);
      }
      render();
    }

    function collectCashflow() {
      const self = currentControlPlayer();
      if (self.cashflow <= 0) {
        pushLog("目前沒有現金流，先把地方主題放進 S1-S3。");
        render();
        return;
      }
      self.points += self.cashflow;
      self.stats.cashCollected += 1;
      pushLog(`${self.name} 收取現金流 +${self.cashflow} 點。`);
      render();
    }

    function refreshShopMarket() {
      const self = currentControlPlayer();
      if (self.points <= 0) {
        pushLog("點數不足，無法刷新商店。");
        render();
        return;
      }
      self.points -= 1;
      buildShopMarket();
      pushLog(`${self.name} 花 1 點刷新卡牌商店。`);
      render();
    }

    function pushGraveyard(player, card, source) {
      if (!card) return;
      player.graveyard.unshift({
        card,
        source,
        round,
        ts: Date.now(),
      });
      if (player.graveyard.length > 20) {
        player.graveyard.length = 20;
      }
    }

    function discardHandCard(player, cardIndex) {
      const turn = currentTurnPlayer();
      if (!turn || turn.id !== player.id) {
        pushLog(`${player.name} 現在還不能換牌，請等到自己的回合。`);
        renderHandManageOverlay();
        return false;
      }

      const card = player.hand[cardIndex];
      if (!card) return false;

      player.hand.splice(cardIndex, 1);
      player.discardPile.unshift(card);
      if (player.discardPile.length > 20) {
        player.discardPile.length = 20;
      }
      pushGraveyard(player, card, "hand");
      player.history.unshift(`${card.name} discarded from hand`);
      if (player.history.length > 6) player.history.length = 6;

      dealToFive(player);
      ensureOpeningThemeCard(player);
      selectedCardIndex = null;
      pushLog(`${player.name} 棄掉 ${card.name}，並補回手牌。`);
      render();
      return true;
    }

    function discardBoardCard(player, lane, options = {}) {
      const turn = currentTurnPlayer();
      if (!turn || turn.id !== player.id) {
        pushLog(`${player.name} cannot discard board cards right now.`);
        renderTableBoardOverlay();
        return false;
      }

      let slotValue = null;
      let targetList = null;
      let slotIndex = -1;
      let label = lane.label;

      if (lane.slot === "attack") {
        targetList = player.board.attack;
        slotIndex = lane.slotIndex;
        slotValue = targetList[slotIndex];
      } else if (lane.slot === "defense") {
        targetList = player.board.defense;
        slotIndex = lane.slotIndex;
        slotValue = targetList[slotIndex];
      } else if (lane.key === "trap") {
        targetList = player.board.trap;
        slotIndex = 0;
        slotValue = targetList[0];
      } else if (lane.slot === "boost") {
        targetList = player.board.boost;
        slotIndex = lane.slotIndex;
        slotValue = targetList[slotIndex];
      } else if (lane.slot === "theme") {
        targetList = player.board.theme;
        slotIndex = lane.slotIndex;
        slotValue = targetList[slotIndex];
      }

      if (!slotValue) return false;

      const card = slotValue.card;
      if (lane.slot === "defense") {
        player.armor = Math.max(0, player.armor - (card.effect?.block || 5));
      } else if (lane.slot === "theme") {
        player.cashflow = Math.max(0, player.cashflow - themeCashflowValue(card));
        player.visitorFlow = Math.max(0, player.visitorFlow - themeVisitorFlowValue(card));
        applyScores(player, card.scores, -1);
      }

      targetList[slotIndex] = null;
      pushGraveyard(player, card, `board:${lane.key}`);
      player.history.unshift(`${card.name} removed from board`);
      if (player.history.length > 6) player.history.length = 6;
      pushLog(`${player.name} removed ${card.name} from ${label}.`);
      if (options.drawReplacement) {
        dealToFive(player);
        ensureOpeningThemeCard(player);
        pushLog(`${player.name} 從桌牌區換下 ${card.name}，補回手牌。`);
      }
      render();
      return true;
    }

    function resetMatch() {
      round = 1;
      turnSeatIndex = 0;
      selectedCardIndex = null;
      attackTargetSeatIndex = null;
      handCollapsed = false;
      handManageOpen = false;
      tableBoardOpen = false;
      tableBoardFocusSeatIndex = 0;
      hudCollapsed = false;
      aiTurnRunning = false;
      turnCounter = 1;
      focusSeatIndex = 0;
      userRotation = 0;
      zoomScale = 1;
      gameStartAt = Date.now();
      gameEnded = false;
      endReason = "";
      endingOverlay.classList.remove("open");
      endingOverlay.innerHTML = "";
      tableBoardOverlay.classList.remove("open");
      tableBoardOverlay.innerHTML = "";

      state.forEach((player, index) => {
        state[index] = createPlayer(player.seatKey, index);
        dealToFive(state[index]);
        ensureOpeningThemeCard(state[index]);
        state[index].history.push("Player state reset.");
      });

      buildShopMarket();
      pushLog("Match started with 4 players.");
      pushLog("Player view reset.");
      render();
      if (state[turnSeatIndex]?.isAI) {
        runAiTurnsUntilHuman();
      }
    }

    function pushLog(message) {
      const entry = {
        round,
        turnSeatIndex,
        message,
        ts: Date.now(),
      };
      const player = state[turnSeatIndex];
      player.history.unshift(message);
      if (player.history.length > 6) player.history.length = 6;
      if (!window._log) window._log = [];
      window._log.unshift(entry);
      window._log.length = Math.min(window._log.length, 12);
    }

    function getSoundContext() {
      if (!soundCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return null;
        soundCtx = new AudioContextClass();
      }
      if (soundCtx.state === "suspended") {
        soundCtx.resume();
      }
      return soundCtx;
    }

    function playTone(ctx, start, duration, fromFreq, toFreq, volume = 0.18, type = "sine") {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(fromFreq, start);
      osc.frequency.exponentialRampToValueAtTime(Math.max(1, toFreq), start + duration);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start + duration + 0.03);
    }

    function playNoise(ctx, start, duration, volume = 0.22, filterFreq = 900) {
      const sampleRate = ctx.sampleRate;
      const buffer = ctx.createBuffer(1, Math.ceil(sampleRate * duration), sampleRate);
      const data = buffer.getChannelData(0);
      for (let index = 0; index < data.length; index += 1) {
        data[index] = Math.random() * 2 - 1;
      }
      const source = ctx.createBufferSource();
      const filter = ctx.createBiquadFilter();
      const gain = ctx.createGain();
      source.buffer = buffer;
      filter.type = "bandpass";
      filter.frequency.setValueAtTime(filterFreq, start);
      filter.Q.setValueAtTime(0.75, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      source.connect(filter).connect(gain).connect(ctx.destination);
      source.start(start);
      source.stop(start + duration + 0.02);
    }

    function playSfx(kind) {
      if (!bgmEnabled) return;
      const ctx = getSoundContext();
      if (!ctx) return;
      const now = ctx.currentTime;

      if (kind === "place") {
        playTone(ctx, now, 0.34, 330, 494, 0.24, "triangle");
        playTone(ctx, now + 0.18, 0.46, 494, 659, 0.18, "sine");
        playTone(ctx, now + 0.46, 0.42, 220, 330, 0.10, "triangle");
      } else if (kind === "turnEnd") {
        playTone(ctx, now, 0.7, 392, 523, 0.2, "triangle");
        playTone(ctx, now + 0.55, 0.76, 523, 659, 0.16, "triangle");
        playTone(ctx, now + 1.18, 0.9, 659, 784, 0.13, "sine");
      } else if (kind === "attack") {
        playTone(ctx, now, 0.34, 230, 54, 0.52, "sawtooth");
        playTone(ctx, now + 0.14, 0.36, 144, 42, 0.38, "square");
        playTone(ctx, now + 0.34, 0.26, 92, 48, 0.28, "sawtooth");
        playNoise(ctx, now + 0.04, 0.32, 0.18, 240);
      } else if (kind === "defense") {
        playTone(ctx, now, 0.5, 260, 620, 0.38, "triangle");
        playTone(ctx, now + 0.28, 0.62, 620, 960, 0.28, "sine");
        playTone(ctx, now + 0.7, 0.42, 420, 560, 0.18, "triangle");
      } else if (kind === "storm") {
        playNoise(ctx, now, 1.5, 0.36, 760);
        playNoise(ctx, now + 0.12, 1.25, 0.24, 1450);
        playTone(ctx, now + 0.16, 0.55, 70, 42, 0.22, "sawtooth");
      } else if (kind === "disaster") {
        playNoise(ctx, now, 1.1, 0.44, 180);
        playTone(ctx, now, 0.58, 92, 32, 0.44, "sawtooth");
        playTone(ctx, now + 0.34, 0.66, 70, 28, 0.34, "square");
      } else if (kind === "gameOver") {
        const rhythm = [196, 247, 294, 392, 330, 392, 494, 392];
        rhythm.forEach((freq, index) => {
          playTone(ctx, now + index * 0.2, 0.2, freq, freq * 1.02, 0.18, index % 2 ? "triangle" : "square");
        });
        playTone(ctx, now + 1.62, 0.9, 392, 196, 0.24, "sine");
      }
    }

    function currentFocusPlayer() {
      return state[focusSeatIndex];
    }

    function currentTurnPlayer() {
      return state[turnSeatIndex];
    }

    function currentControlPlayer() {
      const turn = currentTurnPlayer();
      return turn && !turn.isAI ? turn : state[0];
    }

    function selectedHandCard() {
      const player = currentControlPlayer();
      return selectedCardIndex !== null ? player.hand[selectedCardIndex] : null;
    }

    function isSelectedAttackCard() {
      const card = selectedHandCard();
      return !!card && reel.getCardLane(card.type) === "attack";
    }

    function canAttackTarget(source, targetIndex) {
      const target = state[targetIndex];
      return !!source && !!target && targetIndex !== source.seatIndex && !isBankrupt(target);
    }

    function beginTurn(seatIndex) {
      if (checkGameEnd()) return;
      const expiredStorms = expireStormEffects();
      if (expiredStorms > 0) {
        pushLog(`烏雲逐漸散去，${expiredStorms} 個社區恢復晴朗。`);
      }
      const player = state[seatIndex];
      turnSeatIndex = seatIndex;
      focusSeatIndex = seatIndex;
      player.stats.turnsTaken += 1;
      player.energy = player.maxEnergy;
      player.points += player.cashflow;
      player.manpower += player.population > 5 ? 2 : 1;
      player.time += 1;
      player.tech += 1;
      dealToFive(player);
      ensureOpeningThemeCard(player);
      pushLog(`${player.name} 開始回合${player.cashflow ? `，收取現金流 +${player.cashflow}` : ""}。`);
    }

    function nextAliveSeatIndex(fromIndex) {
      for (let step = 1; step <= state.length; step += 1) {
        const index = (fromIndex + step) % state.length;
        if (!isBankrupt(state[index])) return index;
      }
      return fromIndex;
    }

    function hasOpenSlotForLane(player, lane) {
      if (!player) return false;
      if (lane === "theme") return player.board.theme.some((slot) => !slot);
      if (lane === "attack") return true;
      if (lane === "defense") return player.board.defense.some((slot) => !slot);
      if (lane === "trap") return player.board.trap.some((slot) => !slot);
      return player.board.boost.some((slot) => !slot);
    }

    function hasAnyAttackTargetSpace(aiSeatIndex) {
      return state.some((player, index) => index !== aiSeatIndex && player.hp > 0 && player.board.attack.some((slot) => !slot));
    }

    function cardAiLane(card) {
      if (isMainTheme(card)) return "theme";
      return reel.getCardLane(card.type);
    }

    function boardCardCount(player) {
      return Object.values(player.board).reduce((sum, slots) => sum + slots.filter(Boolean).length, 0);
    }

    function boardSnapshot() {
      return state.map((player) => boardCardCount(player)).join("|");
    }

    function playableAiIndexes(player, wantedLane) {
      return player.hand
        .map((card, index) => ({ card, index, lane: cardAiLane(card) }))
        .filter(({ lane }) => {
          if (wantedLane && lane !== wantedLane) return false;
          if (lane === "attack") return hasAnyAttackTargetSpace(player.seatIndex);
          return hasOpenSlotForLane(player, lane);
        })
        .map(({ index }) => index);
    }

    function chooseAiCardIndex(player) {
      const profile = aiProfiles[player.aiProfileKey] || aiProfiles.operator;
      let priorities = [...profile.priorities];

      if (player.aiProfileKey === "slowLearner" && player.stats.turnsTaken <= 3) {
        const candidates = player.hand
          .map((card, index) => ({ card, index, lane: cardAiLane(card) }))
          .filter(({ lane }) => lane === "attack" ? hasAnyAttackTargetSpace(player.seatIndex) : hasOpenSlotForLane(player, lane));
        if (candidates.length) {
          const seed = (turnCounter + 11) * (player.seatIndex + 3) + player.stats.turnsTaken;
          return candidates[Math.floor(seededUnit(seed) * candidates.length)]?.index ?? -1;
        }
      }

      if (player.aiProfileKey === "prankster" && player.stats.turnsTaken <= 2) {
        priorities = ["attack", "trap", "boost", "theme", "defense"];
      }

      if (player.hp < player.maxHp * 0.65 || hasActiveStorm(player)) {
        priorities = ["defense", "trap", ...priorities.filter((lane) => lane !== "defense" && lane !== "trap")];
      }

      for (const lane of priorities) {
        const indexes = playableAiIndexes(player, lane);
        if (indexes.length) return indexes[0];
      }
      return playableAiIndexes(player, null)[0] ?? -1;
    }

    function chooseAiTargetIndex(aiSeatIndex) {
      const candidates = state
        .map((player, index) => ({ player, index }))
        .filter(({ player, index }) => index !== aiSeatIndex && player.hp > 0 && player.board.attack.some((slot) => !slot));
      if (!candidates.length) return 0;
      const profileKey = state[aiSeatIndex]?.aiProfileKey;
      if (profileKey === "prankster") {
        const humanTarget = candidates.find(({ player }) => !player.isAI);
        if (humanTarget && seededUnit(turnCounter + aiSeatIndex) > 0.25) return humanTarget.index;
        candidates.sort((a, b) => (b.player.scores.tourism + b.player.cashflow + b.player.points) - (a.player.scores.tourism + a.player.cashflow + a.player.points));
      } else if (profileKey === "operator") {
        candidates.sort((a, b) => finalScore(b.player) - finalScore(a.player));
      } else {
        candidates.sort((a, b) => a.player.hp - b.player.hp);
      }
      return candidates[0].index;
    }

    function tryAiPlayCard(player, cardIndex) {
      const card = player.hand[cardIndex];
      if (!card) return false;
      const beforeHand = player.hand.length;
      const beforeBoard = boardSnapshot();
      const lane = cardAiLane(card);
      const targetIndex = lane === "attack" ? chooseAiTargetIndex(player.seatIndex) : player.seatIndex;
      if (lane === "attack" && !canAttackTarget(player, targetIndex)) return false;
      if (lane === "theme") {
        placeThemeCard(player, cardIndex, null, { silentRender: true });
      } else {
        placeCard(player, cardIndex, targetIndex, { silentRender: true });
      }
      return player.hand.length !== beforeHand || boardSnapshot() !== beforeBoard;
    }

    function playAiTurn(seatIndex) {
      const player = state[seatIndex];
      if (!player || player.hp <= 0) {
        pushLog(`${player?.name || "玩家"} 無法行動。`);
        return;
      }

      const profile = aiProfiles[player.aiProfileKey] || aiProfiles.operator;
      let actions = 0;
      const maxActions = player.aiProfileKey === "operator" ? 2 : 1 + (seededUnit(turnCounter + seatIndex * 13) > 0.45 ? 1 : 0);
      for (let step = 0; step < maxActions; step += 1) {
        const cardIndex = chooseAiCardIndex(player);
        if (cardIndex < 0) break;
        if (tryAiPlayCard(player, cardIndex)) {
          actions += 1;
        } else {
          break;
        }
      }

      if (actions <= 0) {
        pushLog(`${player.name} 沒有可用手牌。`);
        return;
      }
      pushLog(`${player.name}（${profile.label}）完成 ${actions} 個行動。`);
    }

    function advanceTurn() {
      if (checkGameEnd()) {
        return;
      }

      const nextIndex = nextAliveSeatIndex(turnSeatIndex);
      if (nextIndex === 0 && turnSeatIndex !== 0) {
        round += 1;
        maybeTriggerDisaster();
      }
      turnCounter += 1;
      beginTurn(nextIndex);
      checkGameEnd();
      render();
    }

    async function runAiTurnsUntilHuman() {
      if (aiTurnRunning) return;
      aiTurnRunning = true;
      const hasHumanSeat = state.some((player) => !player.isAI && player.hp > 0);
      const maxAutoSteps = hasHumanSeat ? 24 : 8;
      let autoSteps = 0;
      try {
        while (state[turnSeatIndex]?.isAI && state[turnSeatIndex]?.hp > 0 && autoSteps < maxAutoSteps) {
          autoSteps += 1;
          await new Promise((resolve) => setTimeout(resolve, 420));
          playAiTurn(turnSeatIndex);
          pushLog(`${currentTurnPlayer().name} 回合結束。`);
          sendCrowdToCenter();
          advanceTurn();
        }
        if (!hasHumanSeat && autoSteps >= maxAutoSteps) {
          pushLog("全 AI 演示暫停：可再按 AI 代牌繼續觀察。");
        }
      } finally {
        aiTurnRunning = false;
        render();
      }
    }

    function endPlayerTurn() {
      if (aiTurnRunning || gameEnded) return;
      const player = currentTurnPlayer();
      if (!player) return;

      pushLog(`${player.name} 回合結束。`);
      playSfx("turnEnd");
      sendCrowdToCenter();
      advanceTurn();
      if (state[turnSeatIndex]?.isAI) {
        runAiTurnsUntilHuman();
      }
    }

    function placeThemeCard(player, cardIndex, explicitSlotIndex = null, options = {}) {
      releaseCrowdFromCenter();
      const card = player.hand[cardIndex];
      if (!isMainTheme(card)) return false;

      const slotIndex = explicitSlotIndex ?? player.board.theme.findIndex((slot) => !slot);
      if (slotIndex < 0 || slotIndex >= player.board.theme.length || player.board.theme[slotIndex]) {
        pushLog("S1-S3 已滿，請先棄置或調整地方主題卡。");
        render();
        return false;
      }

      const pointGain = themePointValue(card);
      const cashflowGain = themeCashflowValue(card);
      const visitorGain = themeVisitorFlowValue(card);
      player.board.theme[slotIndex] = {
        card,
        faceDown: false,
        triggered: true,
        note: `S${slotIndex + 1}`,
        pointGain,
        cashflowGain,
        visitorGain,
      };
      applyScores(player, card.scores, 1);
      player.points += pointGain;
      player.cashflow += cashflowGain;
      player.visitorFlow += visitorGain;
      player.stats.themesPlaced += 1;
      player.hand.splice(cardIndex, 1);
      player.history.unshift(`${card.name} placed in S${slotIndex + 1}`);
      if (player.history.length > 6) player.history.length = 6;
      dealToFive(player);
      ensureOpeningThemeCard(player);
      pushLog(`${player.name} 放置 ${card.name} 到 S${slotIndex + 1}，點數 +${pointGain}，現金流 +${cashflowGain}，人流 +${visitorGain}。`);
      if (!options.silentRender) {
        playSfx("place");
        handCollapsed = false;
      }
      selectedCardIndex = null;
      attackTargetSeatIndex = null;
      if (!options.silentRender) render();
      return true;
    }

    function placeCard(player, cardIndex, targetSeatIndex = focusSeatIndex, options = {}) {
      releaseCrowdFromCenter();
      const card = player.hand[cardIndex];
      if (!card) return;

      if (isMainTheme(card)) {
        placeThemeCard(player, cardIndex, null, options);
        return;
      }

      const lane = reel.getCardLane(card.type);
      const target = state[targetSeatIndex];
      if (!target) return;
      let result = `${player.name} played ${card.name} on ${target.name}.`;

      if (lane === "attack") {
        if (!canAttackTarget(player, targetSeatIndex)) {
          pushLog("攻擊卡需要指定其他仍在遊戲中的玩家。");
          if (!options.silentRender) render();
          return;
        }
        const slotIndex = target.board.attack.findIndex((slot) => !slot);
        if (slotIndex < 0) {
          pushLog(`${target.name} 的攻擊區已滿，無法放置 ${card.name}。`);
          if (!options.silentRender) render();
          return;
        }
        if (slotIndex >= 0) {
          target.board.attack[slotIndex] = {
            card,
            faceDown: false,
            triggered: true,
            note: `攻擊 ${slotIndex + 1}`,
          };
        }
        player.stats.attacksMade += 1;
        result = resolveAttack(target, card, player);
      } else if (lane === "defense") {
        const slotIndex = player.board.defense.findIndex((slot) => !slot);
        if (slotIndex < 0) {
          pushLog(`${player.name} 的防禦區已滿，無法放置 ${card.name}。`);
          if (!options.silentRender) render();
          return;
        }
        if (slotIndex >= 0) {
          player.board.defense[slotIndex] = {
            card,
            faceDown: true,
            triggered: false,
            note: `防禦 ${slotIndex + 1}`,
          };
          player.armor += card.effect?.block || 5;
          player.stats.defensesPlaced += 1;
        }
        result = `${player.name} placed defense ${card.name}.`;
      } else if (lane === "trap") {
        const slotIndex = player.board.trap.findIndex((slot) => !slot);
        if (slotIndex < 0) {
          pushLog(`${player.name} 的陷阱區已滿，無法放置 ${card.name}。`);
          if (!options.silentRender) render();
          return;
        }
        if (slotIndex >= 0) {
          player.board.trap[slotIndex] = {
            card,
            faceDown: true,
            triggered: false,
            note: "陷阱",
          };
          player.stats.trapsPlaced += 1;
        }
        result = `${player.name} placed trap ${card.name}.`;
      } else {
        const slotIndex = player.board.boost.findIndex((slot) => !slot);
        if (slotIndex < 0) {
          pushLog(`${player.name} 的加成區已滿，無法放置 ${card.name}。`);
          if (!options.silentRender) render();
          return;
        }
        if (slotIndex >= 0) {
          player.board.boost[slotIndex] = {
            card,
            faceDown: false,
            triggered: true,
            note: `加成 ${slotIndex + 1}`,
          };
        }
        applyResourceEffect(player, card.effect || { energy: 1 });
        player.stats.boostsPlayed += 1;
        result = `${player.name} placed boost ${card.name}.`;
      }

      player.hand.splice(cardIndex, 1);
      player.history.unshift(`${card.name} moved to the board`);
      if (player.history.length > 6) player.history.length = 6;

      dealToFive(player);
      ensureOpeningThemeCard(player);
      pushLog(result);
      checkGameEnd();
      if (!options.silentRender) {
        playSfx("place");
        handCollapsed = false;
      }
      selectedCardIndex = null;
      attackTargetSeatIndex = null;
      if (!options.silentRender) render();
    }

    function placeSelectedHandCardAtDesk() {
      const self = currentControlPlayer();
      if (selectedCardIndex === null) return false;
      if (self.isAI || currentTurnPlayer()?.id !== self.id) return false;
      if (selectedCardIndex < 0 || selectedCardIndex >= self.hand.length) {
        selectedCardIndex = null;
        return false;
      }

      const card = self.hand[selectedCardIndex];
      if (!card) return false;

      if (isMainTheme(card)) {
        return placeThemeCard(self, selectedCardIndex);
      }

      const lane = reel.getCardLane(card.type);
      if (lane === "attack") {
        if (!canAttackTarget(self, attackTargetSeatIndex)) {
          pushLog("請先指定攻擊目標：可以點 P2/P3/P4 座位，或按手牌區的目標按鈕。");
          render();
          return false;
        }
        const targetIndex = attackTargetSeatIndex;
        placeCard(self, selectedCardIndex, targetIndex);
      } else {
        placeCard(self, selectedCardIndex, self.seatIndex);
      }
      handCollapsed = false;
      selectedCardIndex = null;
      return true;
    }

    function resolveAttack(target, card, source) {
      const damage = card.effect?.damage || 0;
      const trapSlot = target.board.trap[0];
      const defenseSlotIndex = target.board.defense.findIndex((slot) => slot && slot.faceDown);
      let blocked = 0;
      let notes = [];

      if (trapSlot && !trapSlot.triggered) {
        trapSlot.triggered = true;
        trapSlot.faceDown = false;
        notes.push(`${target.name}'s trap triggered.`);
        const trapDamage = trapSlot.card.effect?.trapDamage || 3;
        source.hp = Math.max(0, source.hp - trapDamage);
        source.stats.damageTaken += trapDamage;
        target.stats.trapsTriggered += 1;
      }

      if (defenseSlotIndex >= 0) {
        const defenseSlot = target.board.defense[defenseSlotIndex];
        defenseSlot.faceDown = false;
        defenseSlot.triggered = true;
        blocked = defenseSlot.card.effect?.block || 5;
        notes.push(`${target.name}'s defense blocked damage.`);
        target.stats.defensesTriggered += 1;
        const cleared = clearStormForPlayer(target, "防禦成功，烏雲散去");
        if (cleared) notes.push(cleared);
        playSfx("defense");
      }

      const finalDamage = Math.max(0, damage - blocked);
      target.hp = Math.max(0, target.hp - finalDamage);
      source.stats.damageDealt += finalDamage;
      target.stats.damageTaken += finalDamage;
      addStormEffect(source, 1, "backlash");
      if (defenseSlotIndex < 0) {
        addStormEffect(target, Math.max(1, Math.ceil(finalDamage / 4)), "attacked");
      }
      const sourceBacklashLoss = shiftVisitorsAway(source, 80, target);
      const targetVisitorLoss = shiftVisitorsAway(target, Math.max(160, finalDamage * 45), source);
      playSfx("attack");
      target.history.unshift(`${card.name} dealt ${finalDamage} damage`);
      source.history.unshift(`攻擊造成烏雲，人流 -${sourceBacklashLoss}`);
      target.history.unshift(`黑雲壓境，人流 -${targetVisitorLoss}`);
      if (target.history.length > 6) target.history.length = 6;
      if (source.history.length > 6) source.history.length = 6;

      return `${source.name} attacked ${target.name} for ${damage} damage${blocked ? `, blocked ${blocked}` : ""}${notes.length ? ` (${notes.join(", ")})` : ""}。黑雲壓到 ${target.name}，${targetVisitorLoss} 人流轉往其他社區；${source.name} 也因攻擊背負烏雲，流失 ${sourceBacklashLoss} 人流。`;
    }

    function autoAIPlay() {
      if (turnSeatIndex === 0) {
        pushLog("測試 AI：先結束我方回合，讓下一家開始。");
        endPlayerTurn();
      } else {
        runAiTurnsUntilHuman();
      }
    }

    function seatClasses(seatKey) {
      return `seat ${seatKey} ${focusSeatIndex === seatOrder.indexOf(seatKey) ? "active" : ""}`;
    }

    function renderReel() {
      const focusRotation = tableBoardZone.getRotation(focusSeatIndex);
      document.documentElement.style.setProperty("--reel-rotation", focusRotation);
      document.documentElement.style.setProperty("--reel-user-rotation", `${userRotation}deg`);
      document.documentElement.style.setProperty("--reel-scale", `${zoomScale}`);

      reelHud.innerHTML = "";
      renderCrowdTraffic();
      renderStormOverlays();
      const groups = tableBoardZone.getLaneGroups();
      const lanes = [...groups.main, ...groups.front];
      state.forEach((player, seatIndex) => {
        const board = document.createElement("div");
        board.className = `seat-board ${tableBoardZone.getSeatClass(seatIndex)}`;
        board.innerHTML = `
          <div class="seat-board-title">
            <span>${tableBoardZone.getTitle()}｜${tableBoardZone.getSeatLabel(seatIndex)}</span>
            <button class="table-zone-button" type="button" data-open-table-zone="${seatIndex}">整理換牌</button>
          </div>
        `;
        board.addEventListener("click", () => openTableBoardZone(seatIndex));
        board.querySelector("[data-open-table-zone]").onclick = (event) => {
          event.stopPropagation();
          openTableBoardZone(seatIndex);
        };

        lanes.forEach((lane) => {
          const slot = document.createElement("div");
          slot.className = `slot slot-${lane.key} kind-${lane.kind}`;
          slot.innerHTML = `
            <div class="slot-head">
              <span>${lane.label}</span>
              <span>${lane.slotType}</span>
            </div>
            <div class="slot-body">${renderLaneCards(seatIndex, lane)}</div>
          `;
          const discardButton = slot.querySelector('[data-discard-board="1"]');
          if (discardButton) {
            discardButton.onclick = (event) => {
              event.stopPropagation();
              discardBoardCard(state[seatIndex], lane);
            };
          }
          const readableCard = slot.querySelector('[data-table-card="1"]');
          if (readableCard) {
            readableCard.onclick = (event) => {
              event.stopPropagation();
              const slotValue = getLaneSlotValue(state[seatIndex], lane);
              if (slotValue?.card && !(slotValue.faceDown && !slotValue.triggered)) {
                openCardReader(slotValue.card);
              }
            };
          }
          board.appendChild(slot);
        });

        reelHud.appendChild(board);
      });
    }

    function getPlayerTrafficZones() {
      return [
        { x: 50, y: 76, spreadX: 26, spreadY: 10, tilt: 0, cloudW: 390, cloudH: 245 },
        { x: 77, y: 50, spreadX: 10, spreadY: 24, tilt: 90, cloudW: 340, cloudH: 255 },
        { x: 23, y: 50, spreadX: 10, spreadY: 24, tilt: -90, cloudW: 340, cloudH: 255 },
        { x: 50, y: 24, spreadX: 26, spreadY: 10, tilt: 180, cloudW: 390, cloudH: 245 },
      ];
    }

    function sendCrowdToCenter() {
      crowdCenterUntil = Date.now() + 950;
    }

    function releaseCrowdFromCenter() {
      crowdCenterUntil = 0;
    }

    function seededUnit(seed) {
      const value = Math.sin(seed * 999.17) * 10000;
      return value - Math.floor(value);
    }

    function renderCrowdTraffic() {
      if (!crowdLayer) return;
      crowdLayer.innerHTML = "";
      const zones = getPlayerTrafficZones();
      const returningHome = Date.now() < crowdCenterUntil;
      const colors = ["#ff6b8a", "#ffd86b", "#67e8a5", "#4fd1ff", "#a78bfa", "#fb923c", "#f472b6", "#34d399"];
      const vehicleColors = ["#f97316", "#38bdf8", "#22c55e", "#facc15"];
      state.forEach((player, seatIndex) => {
        const zone = zones[seatIndex];
        const heat = Math.max(0, player.visitorFlow || 0) + Math.max(0, player.scores?.tourism || 0) + Math.max(0, player.cashflow || 0);
        const meepleCount = clamp(4 + heat * 2, 4, 18);
        const vehicleCount = clamp(Math.floor((Math.max(0, player.cashflow || 0) + Math.max(0, player.scores?.income || 0)) / 2), 0, 3);

        for (let index = 0; index < meepleCount; index += 1) {
          const seed = (turnCounter + 3) * 100 + seatIndex * 29 + index;
          const piece = document.createElement("span");
          piece.className = `crowd-piece meeple ${returningHome ? "returning-home" : ""}`;
          const x = returningHome ? 50 + (seededUnit(seed) - 0.5) * 6 : zone.x + (seededUnit(seed) - 0.5) * zone.spreadX;
          const y = returningHome ? 50 + (seededUnit(seed + 0.37) - 0.5) * 5 : zone.y + (seededUnit(seed + 0.37) - 0.5) * zone.spreadY;
          piece.style.setProperty("--x", `${x}%`);
          piece.style.setProperty("--y", `${y}%`);
          piece.style.setProperty("--tilt", `${zone.tilt + (seededUnit(seed + 0.73) - 0.5) * 28}deg`);
          piece.style.setProperty("--color", colors[(seatIndex * 3 + index) % colors.length]);
          piece.style.setProperty("--delay", `${(seededUnit(seed + 1.11) * -2).toFixed(2)}s`);
          piece.style.setProperty("--walk-x", `${((seededUnit(seed + 1.7) - 0.5) * 28).toFixed(1)}px`);
          piece.style.setProperty("--walk-y", `${((seededUnit(seed + 2.1) - 0.5) * 18).toFixed(1)}px`);
          crowdLayer.appendChild(piece);
        }

        for (let index = 0; index < vehicleCount; index += 1) {
          const seed = (turnCounter + 7) * 77 + seatIndex * 31 + index;
          const piece = document.createElement("span");
          const vehicleType = ["bus", "train", "car"][(seatIndex + index) % 3];
          piece.className = `crowd-piece vehicle ${vehicleType} ${returningHome ? "returning-home" : ""}`;
          const offset = (index - 1) * 7;
          piece.style.setProperty("--x", `${returningHome ? 50 + (seededUnit(seed) - 0.5) * 7 : zone.x + (zone.spreadX > zone.spreadY ? offset : 0) + (seededUnit(seed) - 0.5) * 8}%`);
          piece.style.setProperty("--y", `${returningHome ? 50 + (seededUnit(seed + 0.41) - 0.5) * 6 : zone.y + (zone.spreadY >= zone.spreadX ? offset : 0) + (seededUnit(seed + 0.41) - 0.5) * 8}%`);
          piece.style.setProperty("--tilt", `${zone.tilt + (seededUnit(seed + 0.82) - 0.5) * 16}deg`);
          piece.style.setProperty("--color", vehicleColors[(seatIndex + index) % vehicleColors.length]);
          piece.style.setProperty("--delay", `${(seededUnit(seed + 1.23) * -2).toFixed(2)}s`);
          piece.style.setProperty("--walk-x", `${((seededUnit(seed + 1.8) - 0.5) * 42).toFixed(1)}px`);
          piece.style.setProperty("--walk-y", `${((seededUnit(seed + 2.2) - 0.5) * 16).toFixed(1)}px`);
          crowdLayer.appendChild(piece);
        }
      });
    }

    function renderStormOverlays() {
      if (!stormLayer) return;
      stormLayer.innerHTML = "";
      const zones = getPlayerTrafficZones();
      stormEffects = stormEffects.filter((effect) => effect.untilTurn >= turnCounter);
      stormEffects.forEach((effect) => {
        const zone = zones[effect.seatIndex];
        if (!zone) return;
        const cloud = document.createElement("span");
        cloud.className = "crowd-piece storm-cloud";
        cloud.style.setProperty("--x", `${zone.x}%`);
        cloud.style.setProperty("--y", `${zone.y}%`);
        cloud.style.setProperty("--tilt", `${zone.tilt}deg`);
        cloud.style.setProperty("--delay", `${effect.seatIndex * -0.33}s`);
        cloud.style.setProperty("--cloud-w", `${zone.cloudW}px`);
        cloud.style.setProperty("--cloud-h", `${zone.cloudH}px`);
        cloud.style.setProperty("--cloud-opacity", String(clamp(0.34 + effect.strength * 0.08, 0.34, 0.62)));
        stormLayer.appendChild(cloud);
      });
    }

    function laneKindLabel(kind) {
      if (kind === "attack") return "攻擊";
      if (kind === "defense") return "防禦";
      if (kind === "boost") return "經營";
      return "桌牌";
    }

    function getLaneSlotValue(player, lane) {
      if (!player || !lane) return null;
      if (lane.slot === "attack") return player.board.attack[lane.slotIndex];
      if (lane.slot === "defense") return player.board.defense[lane.slotIndex];
      if (lane.key === "trap") return player.board.trap[0];
      if (lane.slot === "boost") return player.board.boost[lane.slotIndex];
      return null;
    }

    function renderLaneCards(seatIndex, lane) {
      const player = state[seatIndex];
      const slotValue = getLaneSlotValue(player, lane);

      if (!slotValue) {
        return `<div class="mini empty">等待放牌</div>`;
      }

      const faceDown = slotValue.faceDown && !slotValue.triggered;
      const card = slotValue.card;
      const tagText = faceDown ? "覆蓋" : `${laneKindLabel(lane.kind)} / Cost ${card.cost}`;
      return `
        <div class="card ${faceDown ? "face-down" : "table-readable"} table-kind-${lane.kind}" ${!faceDown ? `data-table-card="1"` : ""}>
          ${!faceDown && card.image ? `<img class="table-card-art" src="${card.image}" alt="${card.name}">` : ""}
          <div class="name">${faceDown ? "覆蓋牌" : card.name}</div>
          <div class="meta">${faceDown ? "尚未觸發" : card.desc}</div>
          <div class="tag-row">
            <span class="tag">${tagText}</span>
            <span class="tag">${slotValue.note || lane.label}</span>
          </div>
          ${seatIndex === 0 && (lane.slot === "boost" || lane.slot === "defense") ? `
            <div class="card-actions">
              <button class="mini-btn danger" data-discard-board="1">棄置</button>
            </div>
          ` : ""}
        </div>
      `;
    }

    function renderSeats() {
      const mapping = [
        { key: "self", cls: "bottom" },
        { key: "right", cls: "right" },
        { key: "left", cls: "left" },
        { key: "top", cls: "top" },
      ];

      seatGrid.innerHTML = "";
      mapping.forEach(({ key, cls }) => {
        const index = seatOrder.indexOf(key);
        const player = state[index];
        const seat = document.createElement("div");
        const controlPlayer = currentControlPlayer();
        const attackTargetable = isSelectedAttackCard() && canAttackTarget(controlPlayer, index);
        seat.className = `seat ${cls} ${focusSeatIndex === index ? "active" : ""} ${attackTargetable ? "attack-target" : ""}`;
        seat.onclick = () => {
          if (attackTargetable) {
            attackTargetSeatIndex = index;
            placeSelectedHandCardAtDesk();
            return;
          }
          focusSeatIndex = index;
          render();
        };

        if (key === "self") {
          seat.innerHTML = `
            <div class="self-cards"></div>
          `;
        } else {
          seat.innerHTML = `
            <div class="seat-top">
              <div>
                <div class="seat-name">${player.name}</div>
                <div class="seat-meta">${player.isAI ? "AI 代玩" : "真人玩家"}</div>
              </div>
              <div class="seat-meta">HP ${player.hp}/${player.maxHp}</div>
            </div>
            <div class="seat-lines">
              <div>護甲 ${player.armor} | 能量 ${player.energy}/${player.maxEnergy}</div>
              <div>點數 ${player.points} | 現金流 +${player.cashflow}</div>
              <div>本月人潮 ${currentMonthlyVisitors(player).toLocaleString()} 人</div>

              <div>桌面 ${countSlots(player.board)}</div>

    function countSlots(board) {
      const total = [...board.boost, ...board.attack, ...board.defense, ...board.theme].filter(Boolean).length;
      return `${total}/11`;
    }

    function renderFocusChips() {
      focusChips.innerHTML = "";

        const chip = document.createElement("button");
        const attackTargetable = isSelectedAttackCard() && canAttackTarget(controlPlayer, index);
