<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Window</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(9, 15, 34, 0.84);
      --panel-strong: rgba(16, 24, 48, 0.94);
      --line: rgba(120, 160, 255, 0.18);
      --text: #ecf3ff;
      --muted: #8ea0c8;
      --accent: #4fd1ff;
      --accent-2: #7c5cff;
      --danger: #ff6b8a;
      --good: #67e8a5;
      --card: rgba(20, 30, 56, 0.92);
      --card-edge: rgba(118, 166, 255, 0.24);
      --reel-rotation: 0deg;
      --reel-user-rotation: 0deg;
      --reel-scale: 1;
      --seat-bottom: 22px;
      --seat-side: 20px;
      --radius: 22px;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(79, 209, 255, 0.14), transparent 26%),
        radial-gradient(circle at 80% 10%, rgba(124, 92, 255, 0.16), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(103, 232, 165, 0.08), transparent 24%),
        linear-gradient(145deg, #02040a 0%, #091225 42%, #040912 100%);
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr;
    }

    .topbar {
      display: none;
    }

    .left-toolbox {
      position: fixed;
      left: 14px;
      bottom: 14px;
      z-index: 80;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(7, 12, 24, 0.88);
      border: 1px solid rgba(120, 160, 255, 0.18);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    .tool-row {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
    }

    .tool-row .mini-btn {
      font-size: 12px;
      padding: 8px 10px;
      width: 100%;
    }

    .sound-toggle {
      font-size: 18px;
      line-height: 1;
      min-width: 42px;
      min-height: 40px;
    }

    .sound-toggle.playing {
      background: linear-gradient(180deg, #30b6ff, #197ed9);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.18),
        0 0 18px rgba(79, 209, 255, 0.28);
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: 0.02em;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      gap: 10px;
      justify-items: end;
      min-width: 360px;
    }

    .button-row, .focus-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    button, .chip {
      border: 0;
      border-radius: 14px;
      padding: 10px 14px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(56, 76, 116, 0.96), rgba(33, 44, 72, 0.96));
      box-shadow: inset 0 0 0 1px rgba(159, 191, 255, 0.12);
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease, background 0.15s ease;
      font-weight: 700;
    }

    button:hover, .chip:hover { transform: translateY(-1px); filter: brightness(1.08); }
    button.primary { background: linear-gradient(180deg, #30b6ff, #197ed9); }
    button.danger { background: linear-gradient(180deg, #5e6a88, #34405c); }
    button.ghost { background: linear-gradient(180deg, rgba(71, 84, 112, 0.9), rgba(44, 54, 76, 0.92)); }
    button.active, .chip.active {
      box-shadow: inset 0 0 0 1px rgba(79, 209, 255, 0.55), 0 0 0 1px rgba(79, 209, 255, 0.2);
    }

    .chip.attack-target {
      background: linear-gradient(180deg, rgba(255, 107, 138, 0.9), rgba(149, 32, 62, 0.92));
      box-shadow: inset 0 0 0 1px rgba(255, 220, 229, 0.35), 0 0 18px rgba(255, 107, 138, 0.18);
    }

    .range-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="range"] {
      width: 180px;
      accent-color: var(--accent);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      padding: 0;
      min-height: 0;
    }

    .layout.sidebar-hidden {
      grid-template-columns: minmax(0, 1fr);
    }

    .sidebar {
      display: none !important;
    }

    .layout.hud-hidden .theme-slots,
    .layout.hud-hidden .player-hud,
    .layout.hud-hidden .shop-panel,
    .layout.hud-hidden .sidebar {
      display: none;
    }

    .layout.hand-collapsed .theme-slots,
    .layout.hand-collapsed .shop-panel {
      display: none;
    }

    .table-shell {
      position: relative;
      border-radius: 0;
      border: 0;
      background:
        radial-gradient(circle at center, rgba(79, 209, 255, 0.14), transparent 34%),
        radial-gradient(circle at center, rgba(124, 92, 255, 0.10), transparent 52%),
        rgba(3, 8, 22, 0.92);
      overflow: hidden;
      min-height: 0;
      touch-action: none;
      cursor: grab;
    }

    .table-shell.dragging { cursor: grabbing; }

    .table-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 27%, rgba(79, 209, 255, 0.06) 28%, transparent 29%),
        radial-gradient(circle at center, transparent 41%, rgba(124, 92, 255, 0.05) 42%, transparent 43%);
      pointer-events: none;
    }

    .reel-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .theme-slots {
      position: absolute;
      left: auto;
      right: 256px;
      bottom: 248px;
      z-index: 64;
      display: grid;
      grid-template-columns: 82px;
      grid-template-rows: auto repeat(4, 78px) auto;
      gap: 7px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(5, 10, 22, 0.5);
      border: 1px solid rgba(140, 175, 255, 0.16);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    .theme-panel-title,
    .theme-panel-footer {
      grid-column: 1 / -1;
      text-align: center;
      font-weight: 900;
      color: #f2f7ff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
    }

    .theme-panel-title {
      font-size: 14px;
      letter-spacing: 0.06em;
    }

    .theme-panel-footer {
      font-size: 13px;
      color: #d6e8ff;
    }

    .theme-slot {
      min-height: 74px;
      border-radius: 12px;
      padding: 7px;
      background: linear-gradient(180deg, rgba(18, 30, 58, 0.92), rgba(7, 12, 28, 0.9));
      border: 1px solid rgba(169, 207, 255, 0.2);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22), inset 0 0 0 1px rgba(79, 209, 255, 0.04);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, filter 0.16s ease;
    }

    .theme-slot:hover {
      transform: translateY(-3px);
      filter: brightness(1.06);
      border-color: rgba(79, 209, 255, 0.42);
    }

    .theme-slot.empty {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 4px;
      color: var(--muted);
      border-style: dashed;
    }

    .theme-slot.ready {
      border-color: rgba(103, 232, 165, 0.5);
      box-shadow: 0 0 0 1px rgba(103, 232, 165, 0.12), 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .theme-code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      font-weight: 900;
      letter-spacing: 0.03em;
      background: rgba(79, 209, 255, 0.15);
      border: 1px solid rgba(129, 171, 255, 0.22);
      color: #dcf5ff;
    }

    .theme-card {
      display: grid;
      gap: 4px;
    }

    .theme-card img,
    .hand-card-art,
    .shop-card img {
      width: 100%;
      object-fit: cover;
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(4, 8, 18, 0.6);
    }

    .theme-card img {
      height: 34px;
      border-radius: 8px;
    }

    .theme-name {
      font-size: 10px;
      line-height: 1.25;
      font-weight: 900;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .theme-meta {
      font-size: 9px;
      color: var(--muted);
      line-height: 1.25;
    }

    .player-hud {
      position: absolute;
      right: 26px;
      bottom: 18px;
      z-index: 49;
      width: 360px;
      max-width: calc(100% - 920px);
      min-width: 320px;
      padding: 14px 16px;
      border-radius: 0;
      background: linear-gradient(180deg, rgba(18, 29, 55, 0.88), rgba(9, 15, 30, 0.88));
      border-left: 1px solid rgba(140, 175, 255, 0.18);
      box-shadow: inset 0 -1px 0 rgba(140, 175, 255, 0.13);
      pointer-events: auto;
    }

    .player-hud-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 10px;
    }

    .player-hud-name {
      font-size: 18px;
      font-weight: 900;
    }

    .player-hud-sub,
    .player-hud-hp {
      color: var(--muted);
      font-size: 12px;
    }

    .player-hud-lines {
      display: grid;
      gap: 6px;
      color: #d8e6ff;
      font-size: 13px;
      line-height: 1.25;
    }

    .operation-themes {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(140, 175, 255, 0.14);
    }

    .operation-title {
      color: #9de7ff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .operation-theme {
      display: grid;
      gap: 4px;
      padding: 8px 9px;
      border-radius: 13px;
      background: rgba(12, 20, 40, 0.66);
      border: 1px solid rgba(140, 175, 255, 0.14);
    }

    .operation-theme strong {
      font-size: 13px;
      line-height: 1.25;
    }

    .operation-theme span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .operation-theme.gain {
      border-color: rgba(103, 232, 165, 0.28);
      background: rgba(22, 94, 62, 0.18);
    }

    .operation-theme.loss {
      border-color: rgba(255, 107, 138, 0.32);
      background: rgba(116, 28, 54, 0.2);
    }

    .clock-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255, 216, 107, 0.12);
      border: 1px solid rgba(255, 216, 107, 0.28);
      color: #ffe8a3;
      font-weight: 900;
    }

    .shop-panel {
      position: absolute;
      left: 136px;
      top: 138px;
      bottom: auto;
      z-index: 92;
      width: min(500px, calc(100% - 920px));
      max-height: min(650px, calc(100% - 120px));
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(12, 20, 42, 0.96), rgba(5, 10, 23, 0.97));
      border: 1px solid rgba(140, 210, 255, 0.28);
      backdrop-filter: blur(18px);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
      overflow: auto;
      opacity: 0;
      transform: translate(-10px, 0) scale(0.98);
      transform-origin: left top;
      visibility: hidden;
      transition: opacity 0.16s ease, transform 0.16s ease, visibility 0.16s ease;
    }

    .shop-panel.open {
      opacity: 1;
      transform: translate(0, 0) scale(1);
      visibility: visible;
    }

    .shop-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .shop-title {
      display: grid;
      gap: 2px;
    }

    .shop-title strong {
      font-size: 15px;
    }

    .shop-title span {
      color: var(--muted);
      font-size: 11px;
    }

    .shop-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .shop-market {
      display: grid;
      grid-template-columns: repeat(2, minmax(170px, 1fr));
      gap: 12px;
      min-height: 0;
    }

    .shop-card {
      display: grid;
      gap: 8px;
      min-height: 302px;
      padding: 10px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(25, 39, 69, 0.95), rgba(12, 20, 39, 0.95));
      border: 1px solid rgba(140, 175, 255, 0.15);
      cursor: pointer;
    }

    .shop-card.discount {
      border-color: rgba(103, 232, 165, 0.46);
      box-shadow: 0 0 0 1px rgba(103, 232, 165, 0.12), 0 18px 42px rgba(0, 0, 0, 0.24);
    }

    .shop-card.crisis {
      border-color: rgba(255, 107, 138, 0.7);
      box-shadow: 0 0 0 2px rgba(255, 107, 138, 0.26), 0 18px 42px rgba(116, 28, 54, 0.24);
    }

    .price-note {
      width: fit-content;
      padding: 4px 7px;
      border-radius: 999px;
      color: #dff7ff;
      background: rgba(79, 209, 255, 0.12);
      border: 1px solid rgba(79, 209, 255, 0.22);
      font-size: 11px;
      font-weight: 900;
    }

    .price-note.discount { color: #d8ffe9; background: rgba(103, 232, 165, 0.12); border-color: rgba(103, 232, 165, 0.28); }
    .price-note.crisis { color: #ffe0e8; background: rgba(255, 107, 138, 0.13); border-color: rgba(255, 107, 138, 0.34); }

    .shop-card img {
      width: 100%;
      height: 168px;
      border-radius: 14px;
      object-fit: contain;
      background: rgba(5, 10, 22, 0.72);
    }

    .shop-card .name {
      font-size: 15px;
      line-height: 1.2;
      font-weight: 900;
    }

    .shop-card .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .reel-board {
      position: relative;
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      transform: translateZ(0) scale(var(--reel-scale));
      transition: transform 0.38s ease;
      filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.3));
      overflow: hidden;
    }

    .reel-map {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(4, 10, 23, 0.1), rgba(4, 10, 23, 0.26)),
        url("../assets/taiwan-community-table-map.png") center / cover no-repeat;
      border-radius: inherit;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.14), inset 0 -90px 130px rgba(3, 7, 18, 0.28);
    }

    .reel-map::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 34%, rgba(4, 8, 18, 0.10) 58%, rgba(4, 8, 18, 0.24) 100%),
        linear-gradient(90deg, rgba(3, 8, 18, 0.1), transparent 18%, transparent 82%, rgba(3, 8, 18, 0.1));
      pointer-events: none;
    }

    .crowd-layer,
    .storm-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      transform: rotate(calc(var(--reel-rotation) + var(--reel-user-rotation)));
      transition: transform 0.38s ease;
    }

    .crowd-layer { z-index: 2; }
    .storm-layer { z-index: 8; }

    .crowd-piece {
      position: absolute;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%) translateZ(0) rotate(var(--tilt, 0deg));
      filter: drop-shadow(0 7px 8px rgba(0, 0, 0, 0.35));
      animation: crowdWalk 4.8s ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .crowd-piece.returning-home {
      animation: crowdGather 1.15s ease-in-out infinite;
    }

    .meeple {
      width: 16px;
      height: 22px;
      border-radius: 8px 8px 5px 5px;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.28), transparent 38%), var(--color);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: inset -4px -6px 0 rgba(0, 0, 0, 0.18), 0 7px 0 rgba(0, 0, 0, 0.18);
    }

    .meeple::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -7px;
      width: 12px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: inherit;
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: inset -3px -3px 0 rgba(0, 0, 0, 0.16);
    }

    .vehicle {
      height: 18px;
      border-radius: 5px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 35%), var(--color);
      border: 1px solid rgba(255, 255, 255, 0.32);
      box-shadow: inset -6px -7px 0 rgba(0, 0, 0, 0.18), 0 8px 0 rgba(0, 0, 0, 0.2);
    }

    .vehicle.bus { width: 42px; }
    .vehicle.train { width: 58px; border-radius: 8px 5px 5px 8px; }
    .vehicle.car { width: 28px; border-radius: 8px; }

    .vehicle::before,
    .vehicle::after {
      content: "";
      position: absolute;
      bottom: -4px;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #101827;
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .vehicle::before { left: 6px; }
    .vehicle::after { right: 6px; }

    .storm-cloud {
      width: var(--cloud-w, 360px);
      height: var(--cloud-h, 248px);
      border-radius: 0;
      background: url("../assets/effects/storm-cloud-creature-overlay.png") center / contain no-repeat;
      border: 0;
      box-shadow: none;
      opacity: var(--cloud-opacity, 0.48);
      mix-blend-mode: multiply;
      filter: drop-shadow(0 24px 34px rgba(0, 0, 0, 0.44)) saturate(0.92);
      animation: stormFloat 3.8s ease-in-out infinite;
    }

    .storm-cloud::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 70%;
      width: 8px;
      height: 36px;
      transform: translateX(-50%) rotate(12deg);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(96, 165, 250, 0.9), transparent);
      box-shadow:
        -48px 12px 0 rgba(96, 165, 250, 0.45),
        46px 8px 0 rgba(96, 165, 250, 0.42),
        -96px 22px 0 rgba(96, 165, 250, 0.28),
        92px 18px 0 rgba(96, 165, 250, 0.28);
    }

    @keyframes stormFloat {
      0%, 100% { transform: translate(-50%, -50%) translateY(0) rotate(var(--tilt, 0deg)); }
      50% { transform: translate(-50%, -50%) translateY(-9px) rotate(var(--tilt, 0deg)); }
    }

    @keyframes crowdWalk {
      0%, 100% {
        transform: translate(-50%, -50%) translate(0, 0) rotate(var(--tilt, 0deg));
      }
      35% {
        transform: translate(-50%, -50%) translate(var(--walk-x, 10px), var(--walk-y, -6px)) rotate(var(--tilt, 0deg));
      }
      70% {
        transform: translate(-50%, -50%) translate(calc(var(--walk-x, 10px) * -0.45), calc(var(--walk-y, -6px) * 0.7)) rotate(var(--tilt, 0deg));
      }
    }

    @keyframes crowdGather {
      0%, 100% {
        transform: translate(-50%, -50%) translate(0, 0) rotate(var(--tilt, 0deg)) scale(0.92);
      }
      50% {
        transform: translate(-50%, -50%) translate(var(--walk-x, 8px), var(--walk-y, -5px)) rotate(var(--tilt, 0deg)) scale(1.08);
      }
    }

    .reel-hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      transform: rotate(calc(var(--reel-rotation) + var(--reel-user-rotation)));
      transition: transform 0.38s ease;
    }

    .seat-board {
      position: absolute;
      width: 430px;
      height: 230px;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: 26px 86px 86px;
      gap: 5px;
      padding: 9px;
      border-radius: 18px;
      background: rgba(4, 10, 22, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(2px);
      pointer-events: auto;
    }

    .seat-board.self { left: 50%; bottom: 7%; transform: translateX(-50%); }
    .seat-board.top { left: 50%; top: 7%; transform: translateX(-50%) rotate(180deg); }
    .seat-board.right { right: 5%; top: 50%; transform: translateY(-50%) rotate(90deg); }
    .seat-board.left { left: 5%; top: 50%; transform: translateY(-50%) rotate(-90deg); }

    .seat-board-title {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5px;
      color: #f7fbff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.58);
    }

    .table-zone-button {
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 8px;
      color: #e8f7ff;
      background: rgba(79, 209, 255, 0.18);
      border: 1px solid rgba(79, 209, 255, 0.34);
      box-shadow: none;
      font-size: 10px;
    }

    .slot {
      position: relative;
      display: grid;
      gap: 4px;
      width: auto;
      min-height: 0;
      padding: 6px;
      border-radius: 10px;
      background: rgba(6, 12, 24, 0.48);

      line-height: 1.45;
    }

    .zoom-note {
      color: var(--muted);
      font-size: 12px;
    }

    .ending-overlay {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      place-items: center;
      padding: 26px;
      background:
        radial-gradient(circle at 22% 22%, rgba(79, 209, 255, 0.18), transparent 26%),
        radial-gradient(circle at 78% 18%, rgba(255, 216, 107, 0.16), transparent 24%),
        rgba(2, 7, 18, 0.82);
      backdrop-filter: blur(14px);
    }

    .ending-overlay.open {
      display: grid;
    }

    .ending-card {
      width: min(1280px, 96vw);
      max-height: 92vh;
      overflow: auto;
      border-radius: 28px;
      border: 1px solid rgba(170, 210, 255, 0.24);
      background:
        linear-gradient(135deg, rgba(14, 25, 50, 0.96), rgba(6, 13, 30, 0.97)),
        rgba(8, 14, 30, 0.96);
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.46);
      padding: 24px;
    }

    .ending-card.credits-card {
      position: relative;
      width: min(980px, 96vw);
      height: min(760px, 92vh);
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 92%, rgba(79, 209, 255, 0.16), transparent 28%),
        linear-gradient(180deg, #020617, #000);
      border-color: rgba(255, 232, 163, 0.22);
    }

    .credits-roll {
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -125%;
      display: grid;
      gap: 22px;
      text-align: center;
      color: #f8fbff;
      animation: creditsRoll 34s linear forwards;
      text-shadow: 0 2px 18px rgba(79, 209, 255, 0.24);
    }

    .credits-title {
      font-size: clamp(30px, 5vw, 62px);
      font-weight: 1000;
      letter-spacing: 0.08em;
      color: #ffe8a3;
    }

    .credits-section {
      display: grid;
      gap: 7px;
      font-size: clamp(16px, 2.1vw, 25px);
      line-height: 1.55;
    }

    .credits-section strong {
      color: #9de7ff;
      letter-spacing: 0.12em;
      font-size: 0.78em;
    }

    .credits-end {
      margin-top: 28px;
      font-size: clamp(28px, 4.6vw, 58px);
      font-weight: 1000;
      letter-spacing: 0.12em;
      color: #ffffff;
    }

    .credits-qr {
      display: grid;
      place-items: center;
      gap: 8px;
      margin: 26px auto 0;
      color: #dbeafe;
      font-weight: 900;
    }

    .credits-qr img {
      width: 130px;
      height: 130px;
      border-radius: 18px;
      background: white;
      padding: 8px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
    }

    .credits-actions {
      position: absolute;
      right: 22px;
      bottom: 20px;
      display: flex;
      gap: 10px;
      z-index: 2;
    }

    @keyframes creditsRoll {
      from { transform: translateY(0); }
      to { transform: translateY(-215%); }
    }

    .ending-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      border-bottom: 1px solid rgba(140, 175, 255, 0.16);
      padding-bottom: 16px;
      margin-bottom: 18px;
    }

    .ending-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 1000;
      line-height: 1;
    }

    .ending-subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .ending-grid {
      display: grid;
      grid-template-columns: minmax(260px, 0.78fr) minmax(420px, 1.12fr) minmax(280px, 0.82fr);
      gap: 18px;
      align-items: start;
    }

    .ending-section {
      border-radius: 20px;
      border: 1px solid rgba(140, 175, 255, 0.16);
      background: rgba(7, 13, 29, 0.74);
      padding: 16px;
    }

    .ending-section h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .ending-stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .ending-stat {
      border-radius: 14px;
      background: rgba(22, 34, 61, 0.74);
      border: 1px solid rgba(140, 175, 255, 0.13);
      padding: 10px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 12px;
      align-items: center;
    }

    .rank-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: #102033;
      background: linear-gradient(180deg, #ffe8a3, #f6b33b);
      font-weight: 1000;
      box-shadow: 0 10px 24px rgba(246, 179, 59, 0.22);
    }

    .ending-stat span,
    .ending-stat .player-hud-sub {
      color: var(--muted);
      font-size: 11px;
    }

    .ending-stat strong {
      font-size: 18px;
    }

    .ending-summary {
      display: grid;
      gap: 10px;
      margin-top: 12px;
      color: #d7e5ff;
      font-size: 13px;
      line-height: 1.55;
    }

    .ending-summary-card {
      border-radius: 16px;
      padding: 12px;
      background: rgba(12, 19, 36, 0.82);
      border: 1px solid rgba(140, 175, 255, 0.12);
    }

    .ending-summary-card strong {
      display: block;
      color: #ffe8a3;
      margin-bottom: 4px;
    }

    .ending-qr-card {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 10px;
      align-items: center;
    }

    .ending-qr-card img {
      width: 82px;
      height: 82px;
      border-radius: 14px;
      background: white;
      padding: 6px;
    }

    .radar-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
      justify-items: center;
    }

    .radar-svg {
      width: 100%;
      max-width: 430px;
      aspect-ratio: 1;
      border-radius: 24px;
      background: radial-gradient(circle at center, rgba(79, 209, 255, 0.08), rgba(5, 10, 22, 0.72));
      border: 1px solid rgba(140, 175, 255, 0.12);
    }

    .indicator-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .indicator-item {
      display: grid;
      gap: 8px;
      align-items: start;
      padding: 12px;
      border-radius: 16px;
      background: rgba(22, 34, 61, 0.62);
      border: 1px solid rgba(140, 175, 255, 0.10);
      font-size: 12px;
      min-width: 0;
    }

    .indicator-item .grade {
      color: #9de7ff;
      font-weight: 900;
    }

    .indicator-item .score {
      color: #ffe8a3;
      font-weight: 900;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .indicator-item .label {
      color: #f4f8ff;
      font-weight: 900;
      line-height: 1.35;
    }

    .indicator-item small {
      color: var(--muted);
      line-height: 1.45;
    }

    .certificate-card {
      position: relative;
      display: grid;
      gap: 12px;
      min-height: 470px;
      padding: 22px;
      border-radius: 22px;
      color: #3b2508;
      background:
        linear-gradient(180deg, rgba(255, 248, 224, 0.98), rgba(255, 239, 195, 0.98)),
        #fff2c7;
      border: 4px double #c98a21;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .certificate-card::before,
    .certificate-card::after {
      content: "";
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(246, 179, 59, 0.2), transparent 68%);
      pointer-events: none;
    }

    .certificate-card::before { left: -48px; top: -58px; }
    .certificate-card::after { right: -54px; bottom: -60px; }

    .certificate-badge {
      justify-self: center;
      padding: 8px 16px;
      border-radius: 999px;
      background: #0f4c81;
      color: #fff8d8;
      font-weight: 1000;
      letter-spacing: 0.08em;
    }

    .certificate-title {
      text-align: center;
      font-size: 42px;
      font-weight: 1000;
      letter-spacing: 0.14em;
      color: #7a3f00;
    }

    .certificate-name {
      text-align: center;
      font-size: 28px;
      font-weight: 1000;
      color: #123047;
      border-bottom: 2px solid rgba(122, 63, 0, 0.3);
      padding-bottom: 10px;
    }

    .certificate-copy {
      position: relative;
      z-index: 1;
      font-size: 16px;
      line-height: 1.8;
      text-align: center;
    }

    .certificate-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .certificate-stats div {
      padding: 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(122, 63, 0, 0.14);
      font-weight: 900;
    }

    .certificate-footer {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      margin-top: auto;
      color: #704214;
      font-weight: 900;
    }

    .certificate-actions {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .commendation-page {
      display: none;
      gap: 18px;
      align-content: center;
      border: 4px double #0f4c81;
      border-radius: 22px;
      background:
        radial-gradient(circle at 18% 14%, rgba(79, 209, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #ffffff, #eff9ff);
      font-size: 18px;
      line-height: 1.9;
    }

    .commendation-page h2 {
      margin: 0;
      text-align: center;
      font-size: 36px;
      color: #123047;
      letter-spacing: 0.12em;
    }

    .commendation-page .signature {
      margin-top: 20px;
      text-align: right;
      font-weight: 900;
      color: #123047;
    }

    .ending-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    @media (max-width: 980px) {
      .ending-grid,
      .radar-wrap {
        grid-template-columns: 1fr;
      }

      .hand-manage-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .indicator-list {
        grid-template-columns: 1fr;
      }

      .ending-head {
        display: grid;
      }
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    @media (min-width: 1101px) and (max-width: 1500px) {
      .seat.bottom {
        left: 50%;
        transform: translateX(-50%);
        width: min(760px, calc(100% - 390px));
        min-width: 620px;
      }

      .theme-slots {
        left: auto;
        right: 238px;
        bottom: 230px;
        grid-template-columns: 82px;
        grid-template-rows: auto repeat(4, 78px) auto;
      }

      .player-hud {
        left: auto;
        right: 20px;
        width: 330px;
        max-width: 330px;
        min-width: 330px;
      }

      .shop-panel {
        left: 116px;
        right: auto;
        top: 136px;
        bottom: auto;
        width: min(440px, calc(100% - 820px));
        max-width: none;
        max-height: min(620px, calc(100% - 96px));
      }

      .shop-market {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 1100px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100%; }
      .layout {
        grid-template-columns: 1fr;
      }
      .toolbar {
        min-width: 0;
        justify-items: start;
      }
      .seat.bottom { left: 20px; bottom: 24px; width: calc(100% - 40px); max-height: none; }
      .player-hud, .theme-slots, .shop-panel { position: relative; inset: auto; width: auto; max-width: none; min-width: 0; margin: 10px; }
      .theme-slots { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .seat.left, .seat.right, .seat.top { position: relative; inset: auto; transform: none; width: auto; margin: 10px; }
      .seat-grid { position: static; display: grid; grid-template-columns: 1fr; gap: 12px; padding: 12px; }
      .reel-board { width: 100vw; height: 100vh; }
      .seat-board {
        width: 360px;
        height: 184px;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: 24px 70px 70px;
        gap: 4px;
        padding: 7px;
      }
      .slot { width: auto; padding: 5px; }
      .card .meta, .tag-row { display: none; }
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 0;
      }

      body {
        background: white !important;
        margin: 0 !important;
      }

      .toolbar,
      .layout,
      .ending-head,
      .ending-section:not(.certificate-section),
      .certificate-actions {
        display: none !important;
      }

      .ending-overlay,
      .ending-overlay.open {
        position: static;
        display: block;
        padding: 0;
        background: white !important;
        backdrop-filter: none;
      }

      .ending-card {
        width: 100%;
        max-height: none;
        overflow: visible;
        padding: 0;
        border: 0;
        background: white !important;
        box-shadow: none;
      }

      .ending-grid {
        display: block;
      }

      .certificate-section {
        padding: 0;
        border: 0;
        background: white !important;
        box-shadow: none;
      }

      .certificate-section h3 {
        display: none;
      }

      .certificate-card {
        box-sizing: border-box;
        width: 100vw;
        min-height: auto;
        height: 100vh;
        border-radius: 0;
        padding: 18mm;
        page-break-after: always;
        break-after: page;
        page-break-inside: avoid;
        box-shadow: none;
        color-adjust: exact;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .commendation-page {
        display: grid !important;
        box-sizing: border-box;
        width: 100vw;
        height: 100vh;
        page-break-after: avoid;
        break-after: avoid;
        padding: 12mm;
        border-radius: 0;
        color: #0f172a;
        background: white;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="left-toolbox">
      <div class="tool-row">
        <button class="primary" id="btnZoomIn" aria-label="放大">+</button>
        <button class="ghost" id="btnZoomOut" aria-label="縮小">-</button>
        <button class="ghost" id="btnResetView" aria-label="回到玩家視角">r</button>
      </div>
      <div class="tool-row">
        <button class="ghost" id="btnToggleHud">HUD</button>
        <button class="primary" id="btnEndTurn">結束回合</button>

    <main class="layout sidebar-hidden">

          </div>
        </div>
        <div class="seat-grid" id="seatGrid"></div>

        <div class="shop-panel" id="shopPanel" aria-label="卡牌商店"></div>
      </section>

      <aside class="sidebar hidden">
        <section class="panel">
          <h2>玩家概況</h2>
          <div class="status-grid" id="playerStatus"></div>
        </section>

        <section class="panel">
          <h2>對局資訊</h2>

          <h2>事件紀錄</h2>

        </section>
      </aside>
    </main>

    <section class="ending-overlay" id="endingOverlay" aria-label="遊戲結束分析"></section>

  </div>

  <script src="../sample-cards.js?v=20260615_complete_cards"></script>
  <script src="reel.js"></script>
  <script src="table-board-zone.js"></script>
  <script>
    const reel = new TableReelSystem();

    const scoreLabels = {

    let stormEffects = [];

      baseDistance: 0,
    };

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function openCardReader(card) {
      if (!card) return;
      focusedCard = card;
      cardFocusOverlay.classList.add("open");
      cardFocusOverlay.innerHTML = `
        <article class="card-reader" role="dialog" aria-modal="true" aria-label="${escapeHtml(card.name)}">
          ${card.image ? `<img src="${escapeHtml(card.image)}" alt="${escapeHtml(card.name)}">` : ""}
          <div class="reader-name">${escapeHtml(card.name)}</div>
          <div class="reader-meta">${escapeHtml(card.rarity || "卡牌")} · ${escapeHtml(card.type || "未知類型")} / Cost ${card.cost ?? 0}</div>
          <div class="reader-desc">${escapeHtml(card.desc || "這張卡目前沒有描述。")}</div>
          <div class="reader-tip">再點一下，回到卡牌夾</div>

    }

    function closeCardReader() {
      focusedCard = null;
      cardFocusOverlay.classList.remove("open");

    function formatRemainingTime() {
      const remaining = Math.max(0, GAME_DURATION_MS - (Date.now() - gameStartAt));
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function isBankrupt(player) {
      return player.hp <= bankruptHp || player.money <= bankruptMoney;
    }

    function activePlayers() {
      return state.filter((player) => !isBankrupt(player));
    }

    function finalScore(player) {
      const scoreTotal = Object.values(player.scores).reduce((sum, value) => sum + Number(value || 0), 0);
      const penalties = (player.scores.ecology < 0 ? 5 : 0) + (player.scores.publicSupport < 0 ? 5 : 0) + (player.money < 0 ? 5 : 0);
      return scoreTotal + player.population + player.luck + player.points + Math.max(0, player.cashflow) - penalties;
    }

    function getWinner() {
      return [...state].sort((a, b) => finalScore(b) - finalScore(a))[0];
    }

    function indicatorScore(player, key) {
      const s = player.scores;
      const stats = player.stats || {};
      const values = {
        g4_hometown: s.culture + s.tourism + stats.themesPlaced,
        g4_planning: stats.themesPlaced * 2 + stats.boostsPlayed + player.cashflow,
        g4_life: s.publicSupport + stats.defensesPlaced + stats.cashCollected,
        g5_region: s.tourism + Math.floor(player.visitorFlow / 600) + stats.themesPlaced,
        g5_economy: s.income + player.cashflow + Math.floor(player.points / 3) + stats.cardsBought,
        g5_environment: s.ecology + stats.defensesTriggered + Math.max(0, 3 - Math.floor(stats.damageTaken / 6)),
        g6_civic: s.publicSupport + stats.defensesPlaced + stats.trapsPlaced,
        g6_culture: s.culture + Math.max(0, 3 - Math.max(0, s.income - s.culture)),
        g6_problem: stats.defensesTriggered + stats.trapsTriggered + stats.attacksMade + Math.max(0, 5 - Math.floor(stats.damageTaken / 5)),
      };
      return clamp(Math.round(values[key] || 0), 0, 5);
    }

    function buildRadarSvg(player) {
      const center = 150;
      const radius = 108;
      const maxScore = 5;
      const points = competencyIndicators.map((indicator, index) => {
        const angle = -Math.PI / 2 + (Math.PI * 2 * index) / competencyIndicators.length;
        const score = indicatorScore(player, indicator.key);
        const distance = (score / maxScore) * radius;
        return {
          x: center + Math.cos(angle) * distance,
          y: center + Math.sin(angle) * distance,
          axisX: center + Math.cos(angle) * radius,
          axisY: center + Math.sin(angle) * radius,
          labelX: center + Math.cos(angle) * (radius + 28),
          labelY: center + Math.sin(angle) * (radius + 28),
          score,
          indicator,
        };
      });
      const polygon = points.map((point) => `${point.x.toFixed(1)},${point.y.toFixed(1)}`).join(" ");
      const rings = [1, 2, 3, 4, 5].map((level) => {
        const ringPoints = competencyIndicators.map((_, index) => {
          const angle = -Math.PI / 2 + (Math.PI * 2 * index) / competencyIndicators.length;
          const distance = (level / maxScore) * radius;
          return `${(center + Math.cos(angle) * distance).toFixed(1)},${(center + Math.sin(angle) * distance).toFixed(1)}`;
        }).join(" ");
        return `<polygon points="${ringPoints}" fill="none" stroke="rgba(157,231,255,0.16)" stroke-width="1" />`;
      }).join("");
      const axes = points.map((point) => `
        <line x1="${center}" y1="${center}" x2="${point.axisX.toFixed(1)}" y2="${point.axisY.toFixed(1)}" stroke="rgba(255,255,255,0.16)" stroke-width="1" />
        <text x="${point.labelX.toFixed(1)}" y="${point.labelY.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="#dbeafe" font-size="10">${point.indicator.grade}</text>
      `).join("");
      const dots = points.map((point) => `<circle cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="4" fill="#ffd86b" />`).join("");
      return `
        <svg class="radar-svg" viewBox="0 0 300 300" role="img" aria-label="${player.name} 的能力星芒圖">
          ${rings}
          ${axes}
          <polygon points="${polygon}" fill="rgba(79,209,255,0.32)" stroke="#4fd1ff" stroke-width="3" />
          ${dots}
        </svg>
      `;
    }
