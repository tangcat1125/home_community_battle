    function renderPlayerHud() {
      const self = currentControlPlayer();
      const operatingThemes = self.board.theme
        .map((slotValue, index) => ({ slotValue, index }))
        .filter(({ slotValue }) => slotValue);
      const themeHtml = operatingThemes.length
        ? operatingThemes.map(({ slotValue, index }) => {
          const card = slotValue.card;
          const cashflowGain = Number(slotValue.cashflowGain || 0);
          const visitorGain = Number(slotValue.visitorGain || 0);
          const statusClass = cashflowGain < 0 || visitorGain < 0 ? "loss" : "gain";
          const cashflowText = cashflowGain >= 0 ? `正在賺錢 +${cashflowGain}` : `正在虧損 ${cashflowGain}`;
          const visitorText = visitorGain >= 0 ? `導入旅客 +${visitorGain.toLocaleString()}` : `流失旅客 ${visitorGain.toLocaleString()}`;
          return `
            <div class="operation-theme ${statusClass}">
              <strong>S${index + 1}｜${card.name}</strong>
              <span>${cashflowText}｜${visitorText}</span>
            </div>
          `;
        }).join("")
        : `
          <div class="operation-theme loss">
            <strong>尚未營運主題</strong>
            <span>放置地方主題卡後，這裡會顯示賺錢或旅客流失狀態。</span>
          </div>
        `;
      playerHud.innerHTML = `
        <div class="player-hud-top">
          <div>
            <div class="player-hud-name">${self.name}</div>
            <div class="player-hud-sub">${self.isAI ? "AI 代玩" : "玩家本人"}</div>
          </div>
          <div class="player-hud-hp">HP ${self.hp}/${self.maxHp}</div>
        </div>
        <div class="operation-themes">
          <div class="operation-title">營運中的主題</div>
          ${themeHtml}
        </div>
        <div class="player-hud-lines">
          <div>護甲 ${self.armor} | 能量 ${self.energy}/${self.maxEnergy}</div>
          <div>點數 ${self.points} | 現金流 ${self.cashflow >= 0 ? "+" : ""}${self.cashflow} | 錢 ${self.money}</div>
          <div><span class="clock-pill">剩餘 ${formatRemainingTime()}</span></div>
          <div>本月觀光人潮 ${currentMonthlyVisitors(self).toLocaleString()} 人</div>
        </div>
      `;
    }

    function scoreSummary(scores = {}) {
      return Object.entries(scoreLabels)
        .map(([key, label]) => `${label} ${Number(scores[key] || 0) >= 0 ? "+" : ""}${Number(scores[key] || 0)}`)
        .join(" / ");
    }

    function renderThemeSlots() {
      const viewer = currentFocusPlayer();
      const controlPlayer = currentControlPlayer();
      const selected = selectedCardIndex !== null ? controlPlayer.hand[selectedCardIndex] : null;
      const canPlaceTheme = focusSeatIndex === controlPlayer.seatIndex && !controlPlayer.isAI && isMainTheme(selected);
      themeSlots.innerHTML = `<div class="theme-panel-title">地方主題</div>`;

      viewer.board.theme.forEach((slotValue, index) => {
        const slot = document.createElement("div");
        slot.className = `theme-slot ${slotValue ? "" : "empty"} ${!slotValue && canPlaceTheme ? "ready" : ""}`;
        slot.onclick = (event) => {
          event.stopPropagation();
          if (!slotValue && canPlaceTheme) {
            placeThemeCard(controlPlayer, selectedCardIndex, index);
          }
        };

        if (!slotValue) {
          slot.innerHTML = `
            <div class="theme-code">S${index + 1}</div>
            <div class="theme-name">${canPlaceTheme ? "點擊放置" : "空主題"}</div>
          `;
        } else {
          const card = slotValue.card;
          slot.innerHTML = `
            <div class="theme-card">
              ${card.image ? `<img src="${card.image}" alt="${card.name}">` : ""}
              <div class="theme-code">S${index + 1}</div>
              <div class="theme-name">${card.name}</div>
              <div class="theme-meta">營利 +${slotValue.cashflowGain} / 人流 +${slotValue.visitorGain}</div>
              ${viewer.seatIndex === controlPlayer.seatIndex && !controlPlayer.isAI ? `
                <div class="card-actions">
                  <button class="mini-btn danger" data-discard-theme="${index}">棄置</button>
                </div>
              ` : ""}
            </div>
          `;
          const discard = slot.querySelector(`[data-discard-theme="${index}"]`);
          if (discard) {
            discard.onclick = (event) => {
              event.stopPropagation();
              discardBoardCard(viewer, { key: `theme-${index + 1}`, slot: "theme", slotIndex: index, label: `S${index + 1}` });
            };
          }
        }

        themeSlots.appendChild(slot);
      });

      const footer = document.createElement("div");
      footer.className = "theme-panel-footer";
      footer.textContent = `回合營利 +${viewer.cashflow}｜人流 +${viewer.visitorFlow.toLocaleString()}`;
      themeSlots.appendChild(footer);
    }

    function renderShop() {
      const self = currentControlPlayer();
      if (!shopMarket.length) buildShopMarket();
      if (handCollapsed) shopOpen = false;
      shopPanel.classList.toggle("open", shopOpen);
      shopPanel.innerHTML = `
        <div class="shop-header">
          <div class="shop-title">
            <strong>卡牌商店</strong>
            <span>主題卡稀有 · 點數 ${self.points} · 現金流 +${self.cashflow}</span>
          </div>
          <div class="shop-actions">
            <button class="mini-btn" data-collect-cashflow="1">收成</button>
            <button class="mini-btn" data-refresh-shop="1">刷新 1</button>
            <button class="mini-btn danger" data-close-shop="1">關閉</button>
          </div>
        </div>
        <div class="shop-market"></div>
      `;

      shopPanel.querySelector('[data-collect-cashflow="1"]').onclick = (event) => {
        event.stopPropagation();
        collectCashflow();
      };
      shopPanel.querySelector('[data-refresh-shop="1"]').onclick = (event) => {
        event.stopPropagation();
        refreshShopMarket();
      };
      shopPanel.querySelector('[data-close-shop="1"]').onclick = (event) => {
        event.stopPropagation();
        shopOpen = false;
        render();
      };

      const market = shopPanel.querySelector(".shop-market");
      shopMarket.forEach((card, index) => {
        const offer = getShopOffer(card, self);
        const item = document.createElement("div");
        item.className = `shop-card ${offer.state}`;
        item.onclick = (event) => {
          event.stopPropagation();
          openCardReader(card);
        };
        item.innerHTML = `
          ${card.image ? `<img src="${card.image}" alt="${card.name}">` : ""}
          <div class="name">${card.name}</div>
          <div class="meta">${card.rarity || "卡牌"} · ${card.type}</div>
          <div class="price-note ${offer.state}">${offer.label}</div>
          <div class="meta">價格 ${offer.cost} 點${offer.cost !== offer.base ? ` · 原價 ${offer.base}` : ""}</div>
          <button class="mini-btn" data-buy-card="${index}">購買</button>
        `;
        item.querySelector(`[data-buy-card="${index}"]`).onclick = (event) => {
          event.stopPropagation();
          buyShopCard(index);
        };
        market.appendChild(item);
      });
    }

    function openHandManager() {
      handManageOpen = true;
      handCollapsed = false;
      shopOpen = false;
      render();
    }

    function closeHandManager() {
      handManageOpen = false;
      if (handManageOverlay) {
        handManageOverlay.classList.remove("open");
        handManageOverlay.innerHTML = "";
      }
    }

    function renderHandManageOverlay() {
      if (!handManageOverlay) return;
      const self = currentControlPlayer();
      if (!handManageOpen) {
        handManageOverlay.classList.remove("open");
        handManageOverlay.innerHTML = "";
        return;
      }

      const isTurn = currentTurnPlayer()?.id === self.id && !self.isAI && !gameEnded;
      const cards = self.hand.slice(0, 5);
      const cardHtml = cards.length ? cards.map((card, index) => `
        <article class="hand-manage-item">
          ${card.image ? `<img src="${escapeHtml(card.image)}" alt="${escapeHtml(card.name)}">` : `<div class="empty">無圖</div>`}
          <div class="hand-manage-copy">
            <div class="name">${escapeHtml(card.name)}</div>
            <div class="meta">${escapeHtml(card.rarity || "卡牌")} · ${escapeHtml(card.type || "未知")} / Cost ${card.cost ?? 0}</div>
            <div class="desc">${escapeHtml(card.desc || "")}</div>
            <div class="stack-row">
              <span class="tag">${isMainTheme(card) ? "地方主題" : escapeHtml(reel.getCardLane(card.type))}</span>
              <span class="tag">${escapeHtml(card.rarity || "普通")}</span>
            </div>
            <div class="card-actions">
              <button class="mini-btn" data-read-hand-card="${index}">放大閱讀</button>
              <button class="mini-btn danger" data-exchange-hand-card="${index}" ${isTurn ? "" : "disabled"}>棄牌換牌</button>
            </div>
          </div>
        </article>
      `).join("") : `<div class="turn-warning">目前沒有手牌可以整理。</div>`;

      handManageOverlay.classList.add("open");
      handManageOverlay.innerHTML = `
        <article class="hand-manage-card" role="dialog" aria-modal="true">
          <div class="hand-manage-head">
            <div>
              <div class="hand-manage-title">手牌整理區</div>
              <div class="hand-manage-sub">點卡牌可以放大閱讀；自己的回合可以棄牌換牌，避免被攻擊壓住後完全動不了。</div>
            </div>
            <div class="hand-manage-actions">
              <button class="mini-btn" data-close-hand-manager="1">關閉整理</button>
              <button class="mini-btn danger" data-collapse-from-manager="1">收成手牌夾</button>
            </div>
          </div>
          ${isTurn ? "" : `<div class="turn-warning">現在不是你的行動回合，先查看手牌；輪到你時才能棄牌換牌。</div>`}
          <div class="hand-manage-grid">${cardHtml}</div>
        </article>
      `;

      handManageOverlay.querySelector('[data-close-hand-manager="1"]').onclick = (event) => {
        event.stopPropagation();
        closeHandManager();
      };
      handManageOverlay.querySelector('[data-collapse-from-manager="1"]').onclick = (event) => {
        event.stopPropagation();
        closeHandManager();
        handCollapsed = true;
        render();
      };
      handManageOverlay.querySelectorAll("[data-read-hand-card]").forEach((button) => {
        button.onclick = (event) => {
          event.stopPropagation();
          const card = self.hand[Number(button.dataset.readHandCard)];
          openCardReader(card);
        };
      });
      handManageOverlay.querySelectorAll("[data-exchange-hand-card]").forEach((button) => {
        button.onclick = (event) => {
          event.stopPropagation();
          const index = Number(button.dataset.exchangeHandCard);
          const exchanged = discardHandCard(self, index);
          if (exchanged) handManageOpen = true;
        };
      });
    }

    function openTableBoardZone(seatIndex = focusSeatIndex) {
      tableBoardFocusSeatIndex = seatIndex;
      tableBoardOpen = true;
      handManageOpen = false;
      render();
    }

    function closeTableBoardZone() {
      tableBoardOpen = false;
      if (tableBoardOverlay) {
        tableBoardOverlay.classList.remove("open");
        tableBoardOverlay.innerHTML = "";
      }
    }

    function renderTableBoardOverlay() {
      if (!tableBoardOverlay) return;
      if (!tableBoardOpen) {
        tableBoardOverlay.classList.remove("open");
        tableBoardOverlay.innerHTML = "";
        return;
      }

      const player = state[tableBoardFocusSeatIndex] || currentControlPlayer();
      const isTurn = currentTurnPlayer()?.id === player.id && !player.isAI && !gameEnded;
      const items = tableBoardZone.getManageItems(player);
      const itemHtml = items.map(({ lane, value }) => {
        const card = value?.card;
        if (!card) {
          return `
            <article class="table-board-item empty">
              <div class="name">${escapeHtml(lane.label)}</div>
              <div class="desc">${escapeHtml(lane.slotType)} 空位，等待放牌。</div>
            </article>
          `;
        }

        const covered = value.faceDown && !value.triggered;
        return `
          <article class="table-board-item">
            ${covered ? `<div class="card face-down" aria-label="覆蓋牌"></div>` : card.image ? `<img src="${escapeHtml(card.image)}" alt="${escapeHtml(card.name)}">` : `<div class="empty">無圖</div>`}
            <div class="name">${escapeHtml(lane.label)}｜${covered ? "覆蓋牌" : escapeHtml(card.name)}</div>
            <div class="desc">${covered ? "這張牌維持覆蓋，等到被攻擊時才啟動。" : escapeHtml(card.desc || "")}</div>
            <div class="stack-row">
              <span class="tag">${escapeHtml(lane.slotType)}</span>
              <span class="tag">${escapeHtml(card.rarity || "普通")}</span>
            </div>
            <div class="card-actions">
              ${covered ? "" : `<button class="mini-btn" data-read-table-card="${escapeHtml(lane.key)}">放大閱讀</button>`}
              <button class="mini-btn danger" data-exchange-table-card="${escapeHtml(lane.key)}" ${isTurn ? "" : "disabled"}>棄置換牌</button>
            </div>
          </article>
        `;
      }).join("");

      tableBoardOverlay.classList.add("open");
      tableBoardOverlay.innerHTML = `
        <article class="table-board-card" role="dialog" aria-modal="true">
          <div class="hand-manage-head">
            <div>
              <div class="hand-manage-title">${tableBoardZone.getTitle()}｜${escapeHtml(tableBoardZone.getSeatLabel(tableBoardFocusSeatIndex))}</div>
              <div class="hand-manage-sub">放大檢視攻擊、防禦與加成。自己的回合可以把桌牌送進墳場並補回手牌，讓策略重新流動。</div>
            </div>
            <div class="hand-manage-actions">
              <button class="mini-btn" data-close-table-zone="1">關閉整理</button>
            </div>
          </div>
          ${isTurn ? "" : `<div class="turn-warning">目前只能查看；輪到這位玩家時才能棄置換牌。</div>`}
          <div class="table-board-grid">${itemHtml}</div>
        </article>
      `;

      tableBoardOverlay.querySelector('[data-close-table-zone="1"]').onclick = (event) => {
        event.stopPropagation();
        closeTableBoardZone();
      };
      tableBoardOverlay.querySelectorAll("[data-read-table-card]").forEach((button) => {
        button.onclick = (event) => {
          event.stopPropagation();
          const lane = items.find((item) => item.lane.key === button.dataset.readTableCard)?.lane;
          const slotValue = lane ? tableBoardZone.getSlotValue(player, lane) : null;
          if (slotValue?.card) openCardReader(slotValue.card);
        };
      });
      tableBoardOverlay.querySelectorAll("[data-exchange-table-card]").forEach((button) => {
        button.onclick = (event) => {
          event.stopPropagation();
          const lane = items.find((item) => item.lane.key === button.dataset.exchangeTableCard)?.lane;
          if (lane) {
            const exchanged = discardBoardCard(player, lane, { drawReplacement: true });
            if (exchanged) tableBoardOpen = true;
          }
        };
      });
    }

    function renderHand() {
      const self = currentControlPlayer();
      const handWrap = document.createElement("div");
      handWrap.className = "hand-wrap";
      if (hasActiveStorm(self)) {
        handWrap.classList.add("stormed");
      }
      if (handCollapsed) {
        const preview = selectedCardIndex !== null ? self.hand[selectedCardIndex] : self.hand[0];
        handWrap.classList.add("collapsed");
        handWrap.innerHTML = `
          <div class="hand-head">
            <span>手牌夾</span>
            <button class="mini-btn" data-expand-hand="1">整理換牌</button>
          </div>
          <div class="hand-folder">
            <div class="folder-icon">手</div>
            <div class="folder-copy">
              <div class="folder-title">手牌區</div>
              <div class="folder-meta">共 ${self.hand.length} 張</div>
              ${preview ? `<div class="folder-preview">${preview.name}</div>` : `<div class="folder-preview">空</div>`}
            </div>
          </div>
        `;
        handWrap.querySelector(".hand-folder").onclick = (event) => {
          event.stopPropagation();
          openHandManager();
        };
        handWrap.querySelector('[data-expand-hand="1"]').onclick = (event) => {
          event.stopPropagation();
          openHandManager();
        };
      } else {
        handWrap.innerHTML = `
          <div class="hand-head">
            <span class="hand-head-main">
              <span>${self.name} 的手牌（最多 5 張）</span>
              <button class="mini-btn shop-dot ${shopOpen ? "active" : ""}" data-toggle-shop="1" title="卡牌商店">商</button>
            </span>
            <span class="hand-head-actions">
              <button class="mini-btn" data-collapse-hand="1">收合手牌</button>
              <button class="mini-btn" data-manage-hand="1">整理換牌</button>
              <button class="mini-btn" data-collect-cashflow="1">收成 +${self.cashflow}</button>
              <span>${self.isAI ? "AI 代玩中" : "點牌即可出牌"}</span>
            </span>
          </div>
        `;

        handWrap.querySelector('[data-collapse-hand="1"]').onclick = (event) => {
          event.stopPropagation();
          handCollapsed = true;
          shopOpen = false;
          render();
        };
        handWrap.querySelector('[data-toggle-shop="1"]').onclick = (event) => {
          event.stopPropagation();
          shopOpen = !shopOpen;
          render();
        };
        handWrap.querySelector('[data-collect-cashflow="1"]').onclick = (event) => {
          event.stopPropagation();
          collectCashflow();
        };
        handWrap.querySelector('[data-manage-hand="1"]').onclick = (event) => {
          event.stopPropagation();
          openHandManager();
        };

        const handGrid = document.createElement("div");
        handGrid.className = "hand-grid";
        self.hand.slice(0, 5).forEach((card, index) => {
          const cardEl = document.createElement("div");
          cardEl.className = `hand-card ${selectedCardIndex === index ? "selected" : ""}`;
          cardEl.onclick = (event) => {
            event.stopPropagation();
            selectedCardIndex = index;
            handCollapsed = false;
            openCardReader(card);
          };
          const laneLabel = isMainTheme(card) ? "S1-S3" : reel.getCardLane(card.type);
          const playLabel = isMainTheme(card) ? "放到 S 區" : reel.getCardLane(card.type) === "attack" ? "選目標" : "出牌";
          cardEl.innerHTML = `
            ${card.image ? `<img class="hand-card-art" src="${card.image}" alt="${card.name}">` : ""}
            <div class="name">${card.name}</div>
            <div class="meta">${card.type} / Cost ${card.cost}</div>
            <div class="meta desc">${card.desc}</div>
            <div class="stack-row">
              <span class="tag">${card.rarity}</span>
              <span class="tag">${laneLabel}</span>
            </div>
            <div class="card-actions">
              <button class="mini-btn" data-play-hand="1">${playLabel}</button>
              <button class="mini-btn danger" data-discard-hand="1">棄牌</button>
            </div>
          `;
          cardEl.querySelector('[data-play-hand="1"]').onclick = (event) => {
            event.stopPropagation();
            selectedCardIndex = index;
            if (reel.getCardLane(card.type) === "attack") {
              attackTargetSeatIndex = null;
              handCollapsed = false;
              pushLog(`已選擇攻擊卡 ${card.name}，請指定要攻擊的玩家。`);
              render();
            } else {
              placeSelectedHandCardAtDesk();
            }
          };
          cardEl.querySelector('[data-discard-hand="1"]').onclick = (event) => {
            event.stopPropagation();
            discardHandCard(self, index);
          };
          handGrid.appendChild(cardEl);
        });

        handWrap.appendChild(handGrid);

        const selected = selectedHandCard();
        if (selected && reel.getCardLane(selected.type) === "attack") {
          const targetPanel = document.createElement("div");
          targetPanel.className = "attack-target-panel";
          const targetButtons = state
            .map((player, seatIndex) => ({ player, seatIndex }))
            .filter(({ seatIndex }) => canAttackTarget(self, seatIndex))
            .map(({ player, seatIndex }) => `
              <button class="mini-btn" data-attack-target="${seatIndex}">
                ${reel.getSeatLabel(seatIndex)}｜${player.name}
              </button>
            `)
            .join("");
          targetPanel.innerHTML = `
            <strong>指定攻擊目標</strong>
            <div class="attack-target-buttons">${targetButtons || "<span class='mini empty'>沒有可攻擊目標</span>"}</div>
          `;
          targetPanel.querySelectorAll("[data-attack-target]").forEach((button) => {
            button.onclick = (event) => {
              event.stopPropagation();
              attackTargetSeatIndex = Number(button.dataset.attackTarget);
              placeSelectedHandCardAtDesk();
            };
          });
          handWrap.appendChild(targetPanel);
        }
      }

      const boardWrap = document.createElement("div");
      boardWrap.className = "board-wrap";
      boardWrap.innerHTML = `
        <div class="hand-head">
          <span>桌上卡牌區（2 加成 / 2 防禦）</span>
          <span>送入墳場不補牌</span>
        </div>
      `;

      const boardStack = document.createElement("div");
      boardStack.className = "board-stack";
      const boardItems = [
        { key: "boost-1", label: "加成牌 1", value: self.board.boost[0] },
        { key: "boost-2", label: "加成牌 2", value: self.board.boost[1] },
        { key: "defense-1", label: "防禦牌 1", value: self.board.defense[0] },
        { key: "defense-2", label: "防禦牌 2", value: self.board.defense[1] },
      ];

      boardItems.forEach((item) => {
        const panel = document.createElement("div");
        panel.className = "board-item";
        if (!item.value) {
          panel.innerHTML = `<div class="title">${item.label}</div><div class="meta">空位</div>`;
        } else {
          panel.innerHTML = `
            <div class="title">${item.label}: ${item.value.card.name}</div>
            <div class="meta">${item.value.card.type} / Cost ${item.value.card.cost}</div>
            <div class="meta">${item.value.faceDown && !item.value.triggered ? "覆蓋，觸發後翻開" : "已翻開"}</div>
            <div class="card-actions">
              <button class="mini-btn danger" data-board-discard="${item.key}">棄置</button>
            </div>
          `;
          const btn = panel.querySelector(`[data-board-discard="${item.key}"]`);
          btn.onclick = (event) => {
            event.stopPropagation();
            discardBoardCard(self, item.key === "defense-1" ? { key: "defense-1", slot: "defense", slotIndex: 0, label: "防禦 1" }
              : item.key === "defense-2" ? { key: "defense-2", slot: "defense", slotIndex: 1, label: "防禦 2" }
              : item.key === "boost-1" ? { key: "boost-1", slot: "boost", slotIndex: 0, label: "加成 1" }
              : { key: "boost-2", slot: "boost", slotIndex: 1, label: "加成 2" });
          };
        }
        boardStack.appendChild(panel);
      });

      boardWrap.appendChild(boardStack);
      handWrap.appendChild(boardWrap);
      return handWrap;
    }

    function renderLog() {
      logEl.innerHTML = "";
      const entries = (window._log || []).slice(0, 12);
      if (!entries.length) {
        logEl.innerHTML = `<div class="log-entry">目前還沒有事件。</div>`;
        return;
      }
      entries.forEach((entry) => {
        const div = document.createElement("div");
        div.className = "log-entry";
        div.textContent = `[R${entry.round}] ${entry.message}`;
        logEl.appendChild(div);
      });
    }

    function renderBoardControls() {
      const bottomSlot = seatGrid.querySelector(".seat.bottom .self-cards");
      if (!bottomSlot) return;
      const bottomSeat = seatGrid.querySelector(".seat.bottom");
      if (bottomSeat) bottomSeat.classList.toggle("hand-is-collapsed", handCollapsed);
      const existing = bottomSlot.querySelector(".hand-wrap");
      if (existing) existing.remove();
      bottomSlot.appendChild(renderHand());
    }

    function render() {
      layout.classList.toggle("hud-hidden", hudCollapsed);
      layout.classList.toggle("hand-collapsed", handCollapsed);
      renderReel();
      renderSeats();
      renderBoardControls();
      renderThemeSlots();
      renderPlayerHud();
      renderShop();
      renderHandManageOverlay();
      renderTableBoardOverlay();
      renderStatus();
      renderLog();
    }

    function updateSoundButton() {
      const isPlaying = bgmEnabled && !bgmAudio.paused;
      soundToggle.classList.toggle("playing", isPlaying);
      soundToggle.textContent = isPlaying ? "🔊" : "🔇";
      soundToggle.setAttribute("aria-label", isPlaying ? "關閉背景音樂" : "播放背景音樂");
      soundToggle.title = isPlaying ? "關閉背景音樂" : "播放背景音樂";
    }

    async function setBgmEnabled(enabled) {
      bgmEnabled = enabled;
      bgmAudio.volume = 0.68;
      if (enabled) getSoundContext();

      if (!enabled) {
        bgmAudio.pause();
        updateSoundButton();
        return;
      }

      try {
        await bgmAudio.play();
      } catch (error) {
        bgmEnabled = false;
        pushLog("背景音樂需要玩家點擊喇叭後才會播放。");
      }
      updateSoundButton();
    }

    document.getElementById("btnZoomIn").addEventListener("click", () => updateZoomScale(zoomScale + 0.08));
    document.getElementById("btnZoomOut").addEventListener("click", () => updateZoomScale(zoomScale - 0.08));
    document.getElementById("btnResetView").addEventListener("click", () => {
      focusSeatIndex = 0;
      userRotation = 0;
      updateZoomScale(1);
    });
    document.getElementById("btnToggleHud").addEventListener("click", () => {
      hudCollapsed = !hudCollapsed;
      const button = document.getElementById("btnToggleHud");
      button.classList.toggle("active", !hudCollapsed);
      button.textContent = hudCollapsed ? "顯示" : "HUD";
      sidebar.classList.add("hidden");
      layout.classList.add("sidebar-hidden");
      render();
    });
    document.getElementById("btnEndTurn").addEventListener("click", endPlayerTurn);
    document.getElementById("btnAutoAI").addEventListener("click", autoAIPlay);
    soundToggle.addEventListener("click", () => {
      setBgmEnabled(!bgmEnabled);
    });
    cardFocusOverlay.addEventListener("click", (event) => {
      event.stopPropagation();
      if (focusedCard) closeCardReader();
    });
    handManageOverlay.addEventListener("click", (event) => {
      if (event.target === handManageOverlay) {
        closeHandManager();
      }
    });
    tableBoardOverlay.addEventListener("click", (event) => {
      if (event.target === tableBoardOverlay) {
        closeTableBoardZone();
      }
    });
    bgmAudio.addEventListener("play", updateSoundButton);
    bgmAudio.addEventListener("pause", updateSoundButton);
    bgmAudio.volume = 0.68;

    setInterval(() => {
      if (checkGameEnd()) return;
      renderStatus();
      renderPlayerHud();
    }, 1000);

    function updateZoomScale(nextScale) {
      const clamped = clamp(nextScale, 0.9, 1.4);
      zoomScale = clamped;
      render();
    }

    function getDistance(a, b) {
      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    tableShell.addEventListener("pointerdown", (event) => {
      if (event.target.closest("button") || event.target.closest(".seat") || event.target.closest(".sidebar") || event.target.closest(".theme-slots") || event.target.closest(".shop-panel")) {
        return;
      }

      if (selectedCardIndex !== null && !event.target.closest(".slot") && !event.target.closest(".hand-wrap")) {
        const placed = placeSelectedHandCardAtDesk();
        if (placed) {
          event.preventDefault();
          return;
        }
      }

      tableShell.classList.add("dragging");
      tableShell.setPointerCapture(event.pointerId);
      activePointers.set(event.pointerId, event);

      if (activePointers.size === 1) {
        dragState.mode = "rotate";
        dragState.pointerId = event.pointerId;
        dragState.startX = event.clientX;
        dragState.baseRotation = userRotation;
      } else if (activePointers.size === 2) {
        const [first, second] = [...activePointers.values()];
        dragState.mode = "pinch";
        dragState.baseScale = zoomScale;
        dragState.baseDistance = getDistance(first, second);
      }

      event.preventDefault();
    });

    tableShell.addEventListener("pointermove", (event) => {
      if (!activePointers.has(event.pointerId)) return;
      activePointers.set(event.pointerId, event);

      if (dragState.mode === "rotate" && dragState.pointerId === event.pointerId) {
        const deltaX = event.clientX - dragState.startX;
        userRotation = dragState.baseRotation + deltaX * 0.25;
        render();
      } else if (dragState.mode === "pinch" && activePointers.size >= 2) {
        const [first, second] = [...activePointers.values()];
        const distance = getDistance(first, second);
        if (dragState.baseDistance > 0) {
          updateZoomScale(dragState.baseScale * (distance / dragState.baseDistance));
        }
      }

      event.preventDefault();
    });

    function endPointer(event) {
      activePointers.delete(event.pointerId);
      if (activePointers.size === 0) {
        dragState.mode = null;
        dragState.pointerId = null;
        tableShell.classList.remove("dragging");
      } else if (activePointers.size === 1) {
        const [remaining] = [...activePointers.values()];
        dragState.mode = "rotate";
        dragState.pointerId = remaining.pointerId;
        dragState.startX = remaining.clientX;
        dragState.baseRotation = userRotation;
      }
    }

    tableShell.addEventListener("pointerup", endPointer);
    tableShell.addEventListener("pointercancel", endPointer);
    tableShell.addEventListener("lostpointercapture", endPointer);

    tableShell.addEventListener("wheel", (event) => {
      event.preventDefault();
      const direction = Math.sign(event.deltaY);
      const step = event.deltaMode === 1 ? 0.05 : 0.025;
      updateZoomScale(zoomScale - direction * step);
    }, { passive: false });

    resetMatch();
    updateSoundButton();
  </script>
</body>
</html>
